<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>関門 — Gate</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0a0e18">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Shippori+Mincho:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ════════════════════════════
   CSS Variables — 色を変えたい時はここ
   ════════════════════════════ */
:root {
  /* フォント */
  --fd: 'Shippori Mincho', serif;
  --fb: 'Noto Sans JP', sans-serif;

  /* ベースカラー */
  --color-bg-deep:   #1a1a2e;
  --color-bg-mid:    #16213e;
  --color-bg-accent: #0f3460;
  --color-safe-bg:   #060810;  /* セーフエリア外の塗りつぶし */

  /* テキスト */
  --color-text:      #c8cdd3;
  --color-text-sub:  #4a5568;
  --color-text-dim:  #3a4555;

  /* アクセント */
  --color-gold:      #d4b96a;
  --color-warm:      #b0a070;
  --color-night:     #4a5e70;

  /* ステータス */
  --color-ok:    #6a9a5a;
  --color-warn:  #a09060;
  --color-short: #9a5a5a;

  /* フェーズ別背景 */
  --bg-bed:       linear-gradient(135deg, #0a0e18, #141e30);
  --bg-night:     linear-gradient(180deg, #060810, #0c1018, #10162a);
  --bg-wake:      linear-gradient(180deg, #060810, #0c1018, #10162a);
  --bg-wake-done: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  --bg-away:      linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  --bg-return: linear-gradient(135deg, #12162a 0%, #1a2038 50%, #1e1a28 100%);


  /* 日の出グラデーション段階 */
  --sunrise-0: linear-gradient(180deg, #0c1018, #10162a);
  --sunrise-1: linear-gradient(180deg, #1a1520, #1e2040);
  --sunrise-2: linear-gradient(180deg, #2a1c24, #2e2838);
  --sunrise-3: linear-gradient(180deg, #4a3028, #3a2820);
  --sunrise-4: linear-gradient(180deg, #6a4828 0%, #c89060 50%, #f0c880 100%);

  /* カード */
  --card-bg:     rgba(255, 255, 255, 0.03);
  --card-border: rgba(255, 255, 255, 0.08);

  /* UI部品 */
  --chip-border:    rgba(255, 255, 255, 0.06);
  --chip-bg:        rgba(255, 255, 255, 0.02);
  --chip-on-border: var(--color-warm);
  --chip-on-bg:     rgba(176, 160, 96, 0.08);
  --chip-on-text:   #d4c080;
}

/* ════════════════════════════
   リセット・ベース
   ════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  width: 100%;
  overflow-x: hidden;
  overscroll-behavior: none;
  background-color: var(--color-safe-bg);
}
body {
  color: var(--color-text);
  font-family: var(--fb);
}

/* ════════════════════════════
   背景レイヤー（セーフエリア対策）
   ════════════════════════════ */
#bg-layer {
  position: fixed;
  top:    calc(-1 * env(safe-area-inset-top, 0px));
  left:   0;
  right:  0;
  bottom: calc(-1 * env(safe-area-inset-bottom, 0px));
  z-index: 0;
  background: var(--bg-bed);
  transition: background 2s ease;
}

/* ════════════════════════════
   レイアウト
   ════════════════════════════ */
.app {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
  position: relative;
  z-index: 1;
}

/* ヘッダー */
.hdr {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px 8px;
  position: relative;
  z-index: 2;
}
.hdr-title {
  font-family: var(--fd);
  font-size: 15px;
  font-weight: 600;
  color: #5a6272;
  letter-spacing: 1.08em;
}
.hdr-phase {
  font-family: var(--fd);
  font-size: 15px;
  color: var(--color-text-dim);
  letter-spacing: 0.06em;
}

/* タブ */
.tabs {
  display: flex;
  padding: 0 20px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  position: relative;
  z-index: 2;
}
.tab {
  padding: 10px 16px;
  font-size: 13px;
  color: var(--color-text-dim);
  background: none;
  border: none;
  border-bottom: 1.5px solid transparent;
  cursor: pointer;
  font-family: var(--fb);
}
.tab.on {
  color: var(--color-night);
  border-bottom-color: var(--color-night);
  font-weight: 500;
}

/* メインコンテンツ領域 */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 20px;
  gap: 16px;
  position: relative;
  z-index: 2;
  padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px));
}
.main.centered {
  justify-content: flex-start;
  padding-top: 20px;
}
.main.top {
  justify-content: flex-start;
  padding-top: 20px;
}

/* ════════════════════════════
   カード
   ════════════════════════════ */
.card {
  background: var(--card-bg);
  border: 1px solid var(--card-border);
  border-radius: 16px;
  padding: 24px 28px;
  backdrop-filter: blur(10px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  max-width: 380px;
  width: 100%;
  text-align: center;
  min-height: 220px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.img-box {
    position: relative;
    width: 240px;
    height: 160px;
    border-radius: 20px;
overflow: hidden;
    mask-image: 
        linear-gradient(to right, rgba(255,255,255,0),  rgb(255,255,255) 30%, rgb(255,255,255) 70%, rgba(255,255,255,0)),
        linear-gradient(to bottom, rgba(255,255,255,0), rgb(255,255,255) 30%, rgb(255,255,255) 70%, rgba(255,255,255,0));
    mask-composite: intersect;
    -webkit-mask-composite: source-in;
}

.img-box img{
    object-fit: cover;
    position: absolute;
    width: 100%;
    height: 100%;
}


/* ════════════════════════════
   テキスト要素
   ════════════════════════════ */
.clock {
  font-family: var(--fd);
  font-size: 44px;
  color: var(--color-text);
  letter-spacing: 0.04em;
}
.sub {
  font-size: 13px;
  color: var(--color-text-sub);
  text-align: center;
  line-height: 1.6;
}
.msg {
  font-family: var(--fd);
  font-size: 12px;
  line-height: 1.8;
  color: var(--color-warm);
  text-align: center;
  max-width: 320px;
  padding: 0;
  min-height: 3.6em;
  display: flex;
  align-items: center;
  justify-content: center;
}
.accent {
  display: inline-block;
  width: 40px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  margin: 8px 0;
}
.strk {
  font-size: 12px;
  color: #6a5e4a;
  text-align: center;
  font-family: var(--fd);
  height: 20px;
  line-height: 20px;
}
.night-msg {
  font-family: var(--fd);
  font-size: 15px;
  line-height: 2.2;
  color: var(--color-night);
  text-align: center;
  max-width: 280px;
  min-height: 3.2em;
  display: flex;
  align-items: center;
  justify-content: center;
}
.self-wake {
  font-family: var(--fd);
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  text-align: center;
}
.task-lbl { font-family: var(--fd); font-size: 13px; color: #7a7060; text-align: center; }
.task-val { font-family: var(--fd); font-size: 14px; color: #c0b070; text-align: center; margin-top: 4px; }
.task-msg { font-family: var(--fd); font-size: 13px; color: #7a7060; text-align: center; padding: 0 0 4px; }

/* 睡眠情報 */
.sleep-info { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
.stat { text-align: center; padding: 4px 0; }
.stat-v { font-family: var(--fd); font-size: 20px; color: var(--color-text); }
.stat-l { font-size: 11px; color: var(--color-text-sub); margin-top: 2px; }

/* ════════════════════════════
   ボタン
   ════════════════════════════ */
.big-btn {
  width: 170px; height: 170px; border-radius: 50%;
  font-family: var(--fd); font-size: 18px;
  cursor: pointer; transition: all 0.4s;
  display: flex; align-items: center; justify-content: center;
  letter-spacing: 0.1em;
  position: relative; overflow: hidden;
}
.big-btn.bed {
  border: 1.5px solid var(--color-gold);
  background: radial-gradient(circle at 50% 45%, rgba(255,255,255,0.03), transparent 70%);
  color: var(--color-gold);
  box-shadow: 0 0 40px rgba(210,180,100,0.06);
}
.big-btn.wake {
  border: 1.5px solid var(--color-gold);
  background: radial-gradient(circle at 50% 45%, rgba(255,255,255,0.03), transparent 70%);
  color: var(--color-gold);
  box-shadow: 0 0 40px rgba(122,170,106,0.06);
}
.big-btn.dim {
  border-color: #2a2e28 !important;
  background: transparent !important;
  color: #2a2e28 !important;
  box-shadow: none !important;
  cursor: default;
}
.big-btn.faint { opacity: 0.35; }
.sm-btn {
  padding: 10px 20px; border-radius: 24px;
  border: 1px solid var(--chip-border);
  background: var(--chip-bg);
  color: #6a7080;
  font-family: var(--fd); font-size: 13px; cursor: pointer;
}
.xs-btn {
  padding: 6px 10px; border-radius: 16px;
  border: 1px solid var(--chip-border);
  background: none; color: #4a4550;
margin:10px;
  font-family: var(--fb); font-size: 11px; cursor: pointer;
}

/* ════════════════════════════
   入力・チップ
   ════════════════════════════ */
.input-lbl { font-size: 12px; color: var(--color-text-sub); }
.input {
  width: 100%; max-width: 320px;
  padding: 10px 14px;
  background: var(--chip-bg);
  border: 1px solid var(--chip-border);
  border-radius: 6px;
  color: var(--color-text);
  font-family: var(--fb); font-size: 14px; outline: none;
}
.chip-row { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 360px; }
.chip {
  padding: 8px 14px; border-radius: 20px;
  border: 1px solid var(--chip-border);
  background: var(--chip-bg);
  color: #5a6070;
  font-family: var(--fb); font-size: 13px;
  cursor: pointer; transition: all 0.2s;
}
.chip.on { border: 1.5px solid var(--chip-on-border); background: var(--chip-on-bg); color: var(--chip-on-text); }
.chip.wrong { border-color: #6a3030; color: #8a4040; animation: shake 0.4s ease; }
#otherWrap { height: 50px; display: flex; align-items: center; justify-content: center; }
#otherWrap.hidden { display: none; }

/* ════════════════════════════
   背景演出（星・光の粒）
   ════════════════════════════ */
.stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; transition: opacity 3s; }
.star {
  position: absolute; border-radius: 50%; background: #fff;
  opacity: 0.15;
  animation: starTwinkle var(--dur) ease-in-out infinite;
  animation-delay: var(--del);
}
.light-particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.light-p {
  position: absolute; border-radius: 50%; opacity: 0;
  animation: floatUp var(--dur) ease-in infinite;
  animation-delay: var(--del);
}
.ember {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(232,200,122,0.3);
  box-shadow: 0 0 16px rgba(232,200,122,0.2), 0 0 4px rgba(232,200,122,0.4);
  animation: emberPulse 4s ease-in-out infinite;
}

/* ════════════════════════════
   長押しリング（起床ゲート）
   ════════════════════════════ */
.hold-ring { position: relative; width: 180px; height: 180px; }
.hold-ring svg { position: absolute; inset: 0; transform: rotate(-90deg); }
.hold-ring circle.track { fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 3; }
.hold-ring circle.fill  { fill: none; stroke: var(--color-gold); stroke-width: 3; stroke-linecap: round; }
.hold-center {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-family: var(--fd); color: var(--color-gold); letter-spacing: 0.08em;
  cursor: pointer; -webkit-user-select: none; user-select: none;
}
.hold-label { font-size: 16px; }
.hold-sub { font-size: 11px; color: #5a6a5a; margin-top: 4px; }
.sunrise-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; transition: background 0.3s ease; }

/* ════════════════════════════
   オーバーレイ演出
   ════════════════════════════ */
.overlay {
  position: fixed; inset: 0; z-index: 100;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 20px; animation: overlayFadeIn 1.2s ease-out forwards;
}
.overlay.wake-ol { animation-duration: 0.8s; }
.ov-text { animation: textFloat 1.5s ease-out both; }
.ov-text.d1 { animation-delay: 0.4s; }
.ov-text.d2 { animation-delay: 1.0s; }
.ov-text.d3 { animation-delay: 1.6s; }
.overlay.wake-ol .ov-text   { animation-duration: 1.2s; }
.overlay.wake-ol .ov-text.d1 { animation-delay: 0.3s; }
.overlay.wake-ol .ov-text.d2 { animation-delay: 0.8s; }
.overlay.wake-ol .ov-text.d3 { animation-delay: 1.3s; }

/* ════════════════════════════
   履歴・設定
   ════════════════════════════ */
.rec-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.03);
  font-size: 13px; width: 100%; max-width: 400px;
}
.badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; font-family: var(--fb); }
.badge.on  { background: rgba(210,180,100,0.08); color: #a09060; }
.badge.off { background: rgba(255,255,255,0.02); color: #2a3038; }
.s-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 20px; border-bottom: 1px solid rgba(255,255,255,0.03);
  width: 100%; max-width: 400px;
}
.s-lbl { font-size: 12px; color: #6a7080; }
.s-in {
  width: 80px; padding: 6px 5px;
  background: rgba(255,255,255,0.03); border: 1px solid var(--chip-border);
  border-radius: 4px; color: var(--color-text);
  font-family: var(--fb); font-size: 12px; text-align: center; outline: none;
}
.confirm-row { display: flex; gap: 10px; align-items: center; margin-top: 4px; }
.confirm-row span { font-size: 12px; color: #5a4a4a; font-family: var(--fd); }
.del-btn {
  padding: 2px 8px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.04);
  background: none; color: #4a3030; font-size: 10px; cursor: pointer;
  font-family: var(--fb); opacity: 0.6; transition: opacity 0.2s;
}
.del-btn:hover { opacity: 1; }

/* ════════════════════════════
   ユーティリティ
   ════════════════════════════ */
.hidden { display: none !important; }
.view-fade { animation: viewFadeIn 0.4s ease-out forwards; }

/* ════════════════════════════
   アニメーション
   ════════════════════════════ */
@keyframes starTwinkle  { 0%,100% { opacity: 0.15; } 50% { opacity: 0.55; } }
@keyframes emberPulse   { 0%,100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 0.65; transform: scale(1.4); } }
@keyframes overlayFadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes textFloat    { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes shake        { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
@keyframes floatUp      { 0% { opacity: 0; transform: translateY(0); } 15% { opacity: 0.6; } 85% { opacity: 0.4; } 100% { opacity: 0; transform: translateY(calc(-100vh - 40px)); } }
@keyframes viewFadeIn   { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>

<body>

<!-- 背景レイヤー（セーフエリアの外まで拡張） -->
<div id="bg-layer"></div>

<div class="app">
  <div class="hdr">
    <div class="hdr-title">関門</div>
    <div class="hdr-phase" id="phaseLabel"></div>
  </div>
  <div class="tabs">
    <button class="tab on" id="tabGate" onclick="switchView('gate')">関門</button>
    <button class="tab" id="tabHistory" onclick="switchView('history')">記録</button>
    <button class="tab" id="tabSettings" onclick="switchView('settings')">設定</button>
  </div>
  <div id="view" class="main centered"></div>
</div>

<script>
"use strict";

/* ════════════════════════════════════════════════════════════
   1. 定数・メッセージ
   ──────────────────────────────────────────────────────────
   メッセージを追加したい時はここ。
   各配列に文字列を足せば、ランダムで表示される。
   ════════════════════════════════════════════════════════════ */

/* タスク選択肢（就寝ゲートで選ぶ「明朝やること」） */
const TASKS = [
  { id: "job",      label: "求人検索",   icon: "\u{1F50D}", wake: ["求人を探す朝だ。まず検索画面を開け。","今日の巡回が、次の一歩になるかもしれない。","探す手を止めなかったことが、貴殿の強さだ。","一つでいい。条件に合うものを一つ見つけろ。","検索画面を開く。それが今朝の仕事だ。"] },
  { id: "resume",   label: "書類作業",   icon: "\u{1F4C4}", wake: ["書類に向き合う朝だ。一箇所だけでも進めろ。","完璧でなくていい。手を動かせ。","昨夜決めた通り、書類を開け。それだけでいい。","一行でいい。昨日より一行多く書けたら勝ちだ。","ファイルを開け。開いた時点で半分終わっている。"] },
  { id: "study",    label: "勉強・学習", icon: "\u{1F4D6}", wake: ["学びの朝だ。テキストを開け。","静かな朝は、頭に入りやすい。","この時間に学べることが、貴殿の武器になる。"] },
  { id: "spi",      label: "SPI対策",    icon: "\u{270F}\u{FE0F}", wake: ["SPIの朝だ。問題集を開け。まず1問。","計算は書き出せ。暗算するな。","1問でいい。解いた事実が残る。","間違えても構わない。手を動かすことに意味がある。"] },
  { id: "exercise", label: "運動",       icon: "\u{1F3CB}\u{FE0F}", wake: ["体を動かす朝だ。まず立ち上がれ。","筋肉は裏切らない。動け。","軽くでいい。体が目覚める。","一種目でいい。やった事実が残る。","ストレッチだけでもいい。体に朝を知らせろ。"] },
  { id: "other",    label: "その他",     icon: "\u{1F4CD}", wake: ["昨夜決めたことがある。思い出せ。","やると決めた。あとは手を動かすだけだ。","起きた。それが最初の一歩だ。"] },
];

/* 就寝ゲートのメッセージ（時刻条件別） */
const MSG_BEDTIME = {
  early: [
    "眠るには良い時刻である。",
    "上出来だ。早く寝る。それだけで成果である。",
    "まだ余裕がある。今夜の貴殿は賢明だ。",
    "今夜は勝ちである。この貯金が明朝に効く。",
    "明朝の自分に、今できる最善を渡せ。",
    "静かな夜だ。その静けさのまま、眠りに入れ。",
    "余裕を持って終えられる夜は貴重であるな。",
    "夜は判断力が低下する。早く手放して正解だ。",
  ],
  normal: [
    "悪くない。まだ間に合う。横になれ。",
    "目標の時間帯である。あとは眠るだけだ。",
    "ここから先は1分が惜しい。画面を閉じろ。",
    "十分な睡眠時間は確保できる。余計なものは見るな。",
    "間に合った。ボタンを押して、目を閉じろ。",
    "この時間を守れたことが、明朝への布石になる。",
    "目を閉じてから眠りに落ちるまでの時間も計算に入れろ。",
    "よし、ここで止められた。十分だ。",
  ],
  late: [
    "遅い。だが来た。とにかく寝ろ。",
    "睡眠時間が削られている。今すぐ横になれ。",
    "理由は問わない。ボタンを押して寝ろ。",
    "遅れた分は取り戻せない。ここで止めれば最小限で済む。",

/* ════════════════════════════════════════════════════════════
   2. ストレージ（セッション管理）
   ──────────────────────────────────────────────────────────
   セッション = 就寝1回分。bedtime で開き、wakeup で閉じる。
   日付をまたいでも1つのセッションとして扱う。
   ════════════════════════════════════════════════════════════ */

const STORAGE_RECORDS  = "gate.sessions.v4";
const STORAGE_SETTINGS = "gate.settings.v4";

const DEFAULT_SETTINGS = {
  wakeTarget: "05:00",          // 起床目標時刻
  awayStart:  "10:00",          // 不在開始
  awayEnd:    "17:00",          // 不在終了
  wakeReadyMinutes: 120,        // 起床目標の何分前から起床ゲートを表示
  thresholds: null,             // null = 自動計算。手動設定時は {early, normal, late}
};

let records  = [];
let settings = {};

function loadRecords() {
  try { return JSON.parse(localStorage.getItem(STORAGE_RECORDS)) || []; }
  catch { return []; }
}
function saveRecords() {
  localStorage.setItem(STORAGE_RECORDS, JSON.stringify(records));
}
function loadSettings() {
  try { return { ...DEFAULT_SETTINGS, ...JSON.parse(localStorage.getItem(STORAGE_SETTINGS)) }; }
  catch { return { ...DEFAULT_SETTINGS }; }
}
function saveSettings() {
  localStorage.setItem(STORAGE_SETTINGS, JSON.stringify(settings));
}

/* セッション操作 */

function getActiveSession() {
  // 就寝済み・起床未了のセッションを探す（最新のもの）
  return [...records].reverse().find(r => r.bedtime && !r.wakeup) || null;
}

function getLastCompletedSession() {
  // 最後に完了した（起床済み）セッション
  return [...records].reverse().find(r => r.wakeup) || null;
}

function createSession(bedtimeISO, task, taskId) {
  const session = {
    id:          Date.now().toString(36),
    bedtime:     bedtimeISO,
    wakeup:      null,
    task:        task,
    taskId:      taskId,
    wakeMsg:     null,   // 起床時に確定
    taskWakeMsg: null,
    reminderMsg: null,
  };
  records.push(session);
  saveRecords();
  return session;
}

function completeSession(sessionId, wakeupISO) {
  const session = records.find(r => r.id === sessionId);
  if (!session) return null;

  session.wakeup = wakeupISO;

  // 起床メッセージを確定して保存
  const sleepMin = diffMinutes(session.bedtime, wakeupISO);
  const category = sleepCategory(sleepMin);
  session.wakeMsg     = pick(MSG_WAKEUP[category]);
  const taskDef       = TASKS.find(t => t.id === session.taskId);
  session.taskWakeMsg = taskDef ? pick(taskDef.wake) : null;
  session.reminderMsg = session.task ? pick(MSG_TASK_REMINDER) : null;

  saveRecords();
  return session;
}

function deleteSession(sessionId) {
  records = records.filter(r => r.id !== sessionId);
  saveRecords();
}

function cancelActiveSession() {
  const active = getActiveSession();
  if (active) {
    records = records.filter(r => r.id !== active.id);
    saveRecords();
  }
}


/* ════════════════════════════════════════════════════════════
   3. ユーティリティ関数
   ════════════════════════════════════════════════════════════ */

const $ = (selector) => document.querySelector(selector);
const pick = (array) => array[Math.floor(Math.random() * array.length)];
const pad  = (n) => String(n).padStart(2, "0");

function currentHHMM() {
  const d = new Date();
  return pad(d.getHours()) + ":" + pad(d.getMinutes());
}

function formatTime(iso) {
  if (!iso) return "--:--";
  const d = new Date(iso);
  return pad(d.getHours()) + ":" + pad(d.getMinutes());
}

function diffMinutes(isoA, isoB) {
  if (!isoA || !isoB) return null;
  return Math.round((new Date(isoB) - new Date(isoA)) / 60000);
}

function formatDuration(minutes) {
  if (minutes == null) return "--";
  const h = Math.floor(minutes / 60);
  const m = minutes % 60;
  return h + "時間" + (m > 0 ? m + "分" : "");
}

function toMinutes(hhmm) {
  const [h, m] = hhmm.split(":").map(Number);
  return h * 60 + m;
}

function minutesUntil(targetHHMM) {
  const now = new Date();
  const [h, m] = targetHHMM.split(":").map(Number);
  const target = new Date(now);
  target.setHours(h, m, 0, 0);
  if (target <= now) target.setDate(target.getDate() + 1);
  return Math.round((target - now) / 60000);
}

function sleepCategory(minutes) {
  if (minutes == null || minutes >= 360) return "enough";
  if (minutes >= 300) return "short";
  return "veryShort";
}

function sleepDurationColor(minutes) {
  if (minutes == null || minutes >= 360) return "var(--color-ok)";
  if (minutes >= 300) return "var(--color-warn)";
  return "var(--color-short)";
}

/* 就寝時刻のカテゴリ判定 */
function bedtimeCategory() {
  const th = getThresholds();
  const h = new Date().getHours();
  const m = new Date().getMinutes();
  const nowMin = h * 60 + m;

  // 正午（12:00）を基点にして「夜の時間軸」に正規化する。
  // こうすると 22:00→600, 23:00→660, 0:00→720, 1:00→780 と
  // 日付をまたいでも数値が単調増加する。
  const normalize = (min) => (min - 720 + 1440) % 1440;

  const now_n    = normalize(nowMin);
  const early_n  = normalize(toMinutes(th.early));
  const normal_n = normalize(toMinutes(th.normal));
  const late_n   = normalize(toMinutes(th.late));

  if (now_n < early_n)  return "early";
  if (now_n < normal_n) return "normal";
  if (now_n < late_n)   return "late";
  return "midnight";
}

/* 起床目標から就寝閾値を自動計算 */
function autoThresholds(wakeTarget) {
  const wakeMin = toMinutes(wakeTarget);
  const calc = (hoursBefore) => {
    const m = (wakeMin - hoursBefore * 60 + 1440) % 1440;
    return pad(Math.floor(m / 60)) + ":" + pad(m % 60);
  };
  return { early: calc(7), normal: calc(6), late: calc(5) };
}

function getThresholds() {
  return settings.thresholds || autoThresholds(settings.wakeTarget);
}

/* 連続記録の算出 */
function getStreak(field) {
  let count = 0;
  const sorted = [...records].filter(r => r[field]).sort((a, b) => {
    return new Date(b[field]) - new Date(a[field]);
  });
  // 日付が連続しているか確認
  for (let i = 0; i < sorted.length; i++) {
    const d = new Date(sorted[i][field]);
    if (i === 0) { count = 1; continue; }
    const prev = new Date(sorted[i - 1][field]);
    const dayDiff = Math.round((prev - d) / 86400000);
    if (dayDiff <= 1.5) count++;  // 1日以内の差なら連続とみなす
    else break;
  }
  return count;
}

/* 日付ベースの疑似ランダム（不在メッセージ等の日替わり固定用） */
function seededPick(array, seed) {
  let h = 0;
  for (let i = 0; i < seed.length; i++) {
    h = ((h << 5) - h) + seed.charCodeAt(i);
    h |= 0;
  }
  return array[Math.abs(h) % array.length];
}

function formatDate(iso) {
  const d = new Date(iso);
  const dow = "\u65E5\u6708\u706B\u6C34\u6728\u91D1\u571F"[d.getDay()];
  return (d.getMonth() + 1) + "/" + d.getDate() + " (" + dow + ")";
}


/* ════════════════════════════════════════════════════════════
   4. フェーズ判定
   ──────────────────────────────────────────────────────────
   セッションの状態と時刻から、表示するフェーズを決める。
   ════════════════════════════════════════════════════════════ */

function detectPhase() {
  const active = getActiveSession();
  const now = new Date();

  /* ── 就寝中（セッションが開いている） ── */
  if (active) {
    return isNearWakeTarget(active) ? "wake" : "night";
  }

  /* ── セッションが開いていない ── */
  const nowMin = now.getHours() * 60 + now.getMinutes();
  const awayStart = toMinutes(settings.awayStart);
  const awayEnd   = toMinutes(settings.awayEnd);

  // 不在時間帯
  if (nowMin >= awayStart && nowMin < awayEnd) {
    return "away";
  }

// 不在後（夕方以降）
if (nowMin >= awayEnd) {
  const th = getThresholds();
  const earlyMin = toMinutes(th.early);
  // bedtimeCategoryと同じ正規化で日またぎに対応
  const normalize = (min) => (min - 720 + 1440) % 1440;
  if (normalize(nowMin) < normalize(earlyMin)) {
    return "return";
  }
  return "bed";
}

  // 不在前（朝の時間帯）→ 最近起きたなら通過済み、さもなくば就寝ゲート
  const lastDone = getLastCompletedSession();
  if (lastDone && lastDone.wakeup) {
    const hoursSince = (now - new Date(lastDone.wakeup)) / 3600000;
    if (hoursSince < 12) return "wake-done";
  }

  return "bed";
}

/* 起床ゲートを表示するか判定（セッションの就寝時刻基準） */
function isNearWakeTarget(session) {
  const now = new Date();
  const bedtime = new Date(session.bedtime);
  const [wh, wm] = settings.wakeTarget.split(":").map(Number);

  // 就寝後の最初の起床目標時刻を算出
  const target = new Date(bedtime);
  target.setHours(wh, wm, 0, 0);
  if (target <= bedtime) {
    target.setDate(target.getDate() + 1);
  }

  // 起床ゲート開始 = 目標の wakeReadyMinutes 分前
  const readyTime = new Date(target.getTime() - settings.wakeReadyMinutes * 60000);
  return now >= readyTime;
}

/* 夜更けフェーズ内で「夜明け前」かどうか */
function isPredawn() {
  const h = new Date().getHours();
  const [wh] = settings.wakeTarget.split(":").map(Number);
  return (h >= Math.max(0, wh - 2) && h < wh) || (h >= 3 && h < wh);
}

  clearEffects();

  $("#phaseLabel").textContent = currentView === "gate" ? (PHASE_NAMES[currentPhase] || "") : "";
  VIEW().className = "main " + (currentView === "gate" ? "centered" : "top");

  // フェードイン
  VIEW().classList.remove("view-fade");
  void VIEW().offsetWidth;
  VIEW().classList.add("view-fade");

  switch (currentView) {
    case "gate":
      switch (currentPhase) {
        case "bed":       renderBed();      break;
        case "night":     renderNight();    break;
        case "wake":      renderWake();     break;
        case "wake-done": renderWakeDone(); break;
        case "away":      renderAway();     break;
case "return":  renderReturn();  break;
        default:          renderBed();
      }
      break;
    case "history":  renderHistory();  break;
    case "settings": renderSettings(); break;
  }
}

/* ════════════════════════════════════════════════════════════
   9. 起床ゲート（3段階）
   ──────────────────────────────────────────────────────────
   Step 1: タスク確認クイズ（画面を見て判断する）
   Step 2: 長押し（4秒、日の出演出）
   Step 3: おはよう演出 → 結果表示
   ════════════════════════════════════════════════════════════ */

function renderWake() {
  createLightParticles();

  const active    = getActiveSession();
  const correctId = active ? active.taskId : null;

  const V = VIEW();
  V.innerHTML =
    '<div class="card" style="background:rgba(255,255,255,0.04)">' +
      '<div class="clock" id="clk" style="font-size:36px">' + currentHHMM() + '</div>' +
      '<div class="accent"></div>' +
      '<div class="msg" id="wakeMsg">目が覚めたか。──昨夜決めたことを思い出せ。</div>' +
      '<div class="sub" id="wakeSub">今日やることを選べ。</div>' +
    '</div>' +
    '<div class="chip-row" id="wakeQuiz"></div>' +
    '<div id="wakeStep2" class="hidden" style="display:flex;flex-direction:column;align-items:center;gap:12px"></div>';

  /* クイズ選択肢を生成（正解 + ランダム2つ） */
  let choices = [];
  if (correctId) {
    choices.push(correctId);
    const others = TASKS.filter(t => t.id !== correctId).map(t => t.id);
    while (choices.length < 3 && others.length) {
      const i = Math.floor(Math.random() * others.length);
      choices.push(others.splice(i, 1)[0]);
    }
    // シャッフル
    for (let i = choices.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [choices[i], choices[j]] = [choices[j], choices[i]];
    }
  } else {
    choices = TASKS.slice(0, 3).map(t => t.id);
  }

  const quizArea = $("#wakeQuiz");
  choices.forEach(id => {
    const taskDef = TASKS.find(t => t.id === id);
    const btn = document.createElement("button");
    btn.className = "chip";
    btn.textContent = taskDef.icon + " " + taskDef.label;

    btn.onclick = () => {
      if (id === correctId || !correctId) {
        btn.classList.add("on");
        $("#wakeMsg").textContent = "そうだ。──では、起きろ。";
        $("#wakeSub").textContent = "環を長押しせよ。";
        quizArea.classList.add("hidden");
        showHoldRing();
      } else {
        btn.classList.add("wrong");
        setTimeout(() => btn.classList.remove("wrong"), 500);
        $("#wakeMsg").textContent = "違う。──もう一度思い出せ。";
      }
    };

    quizArea.appendChild(btn);
  });
}

function showHoldRing() {
  const step2 = $("#wakeStep2");
  step2.classList.remove("hidden");
  step2.innerHTML =
    '<div class="hold-ring">' +
      '<svg viewBox="0 0 180 180">' +
        '<circle class="track" cx="90" cy="90" r="85"/>' +
        '<circle class="fill" id="holdFill" cx="90" cy="90" r="85" stroke-dasharray="534" stroke-dashoffset="534"/>' +
      '</svg>' +
      '<div class="hold-center" id="holdArea">' +
        '<div class="hold-label">長押し</div>' +
        '<div class="hold-sub">押し続けろ</div>' +
      '</div>' +
    '</div>';

  /* 日の出背景 */
  const sunriseBg = document.createElement("div");
  sunriseBg.className = "sunrise-bg";
  sunriseBg.style.background = "var(--sunrise-0)";
  document.body.appendChild(sunriseBg);
  createLightParticles();

  const HOLD_DURATION = 4000;
  const CIRCUMFERENCE = 534;
  const fillCircle = $("#holdFill");
  const holdArea   = $("#holdArea");
  let holding = false;
  let startTime = 0;
  let animFrame = 0;
  let progress = 0;

  const SUNRISE_STEPS = [
    [0.00, "--sunrise-0"],
    [0.25, "--sunrise-1"],
    [0.50, "--sunrise-2"],
    [0.75, "--sunrise-3"],
    [1.00, "--sunrise-4"],
  ];

  function updateSunrise(p) {
    for (let i = SUNRISE_STEPS.length - 1; i >= 0; i--) {
      if (p >= SUNRISE_STEPS[i][0]) {
        sunriseBg.style.background = "var(" + SUNRISE_STEPS[i][1] + ")";
        return;
      }
    }
  }

  function tick() {
    if (!holding) return;
    progress = Math.min(1, (Date.now() - startTime) / HOLD_DURATION);
    fillCircle.setAttribute("stroke-dashoffset", CIRCUMFERENCE * (1 - progress));
    updateSunrise(progress);

    // テキストの色も明るくなる
    const brightness = Math.round(160 + progress * 80);
    holdArea.querySelector(".hold-label").style.color =
      "rgb(" + brightness + "," + (brightness - 20) + "," + (brightness - 40) + ")";

    if (progress >= 1) {
      executeWakeup();
      return;
    }
    animFrame = requestAnimationFrame(tick);
  }

  function startHold(e) {
    e.preventDefault();
    holding = true;
    startTime = Date.now() - progress * HOLD_DURATION;
    tick();
  }

  function stopHold() {
    holding = false;
    cancelAnimationFrame(animFrame);
    if (progress < 1) {
      // ゆっくり戻す
      const revert = () => {
        progress = Math.max(0, progress - 0.02);
        fillCircle.setAttribute("stroke-dashoffset", CIRCUMFERENCE * (1 - progress));
        updateSunrise(progress);
        if (progress > 0) requestAnimationFrame(revert);
      };
      revert();
    }
  }

  holdArea.addEventListener("mousedown", startHold);
  holdArea.addEventListener("touchstart", startHold, { passive: false });
  document.addEventListener("mouseup", stopHold);
  document.addEventListener("touchend", stopHold);
  document.addEventListener("touchcancel", stopHold);
}

function executeWakeup() {
  document.querySelectorAll(".sunrise-bg").forEach(el => el.remove());

  const active = getActiveSession();
  if (active) {
    completeSession(active.id, new Date().toISOString());
  }
  currentPhase = detectPhase();

  /* おはよう演出 */
  const overlay = document.createElement("div");
  overlay.className = "overlay wake-ol";
  overlay.style.background = "radial-gradient(ellipse at 50% 40%, rgba(26,33,62,0.9), rgba(15,20,46,0.95))";
  overlay.innerHTML =
    '<div class="ov-text d1" style="font-family:var(--fd);font-size:24px;color:#d4b870;letter-spacing:0.2em">目覚めの刻</div>' +
    '<div class="ov-text d2" style="font-family:var(--fd);font-size:13px;color:#8a7a5a;font-weight:600;letter-spacing:0.08em">おはよう。…よく眠れたか。</div>';
  document.body.appendChild(overlay);

  setTimeout(() => {
    overlay.remove();
    render();
  }, 8000);
}

/* ════════════════════════════════════════════════════════════

   ════════════════════════════════════════════════════════════ */

function getReturnSubPhase() {
  const h = new Date().getHours();
  const m = new Date().getMinutes();
  const nowMin = h * 60 + m;
  const bathStart = 20 * 60;      // 20:00
  const preBathEnd = 21 * 60 + 30; // 21:30
  if (nowMin < bathStart) return "greet";   // ～20:00 は挨拶のまま
  if (nowMin < preBathEnd) return "bath";   // 20:00～21:30
  return "preBed";                          // 21:30～
}

/* 時間帯ごとのメッセージを、同じ時間帯内では固定する */
let returnMsgCache = { subPhase: null, msg: "" };

function getReturnMessage() {
  const sub = getReturnSubPhase();
  // 初回表示は greet から始める（不在から戻った直後）
  if (returnMsgCache.subPhase === null) {
    returnMsgCache.subPhase = "greet";
    returnMsgCache.msg = pick(MSG_RETURN.greet);
    // greet でない時間帯なら、次の tick で切り替わる
    if (sub !== "greet") {
      returnMsgCache.subPhase = sub;
      returnMsgCache.msg = pick(MSG_RETURN[sub]);
    }
    return returnMsgCache.msg;
  }
  // 時間帯が変わったらメッセージ更新
  if (sub !== returnMsgCache.subPhase) {
    returnMsgCache.subPhase = sub;
    returnMsgCache.msg = pick(MSG_RETURN[sub]);
  }
  return returnMsgCache.msg;
}


function getReturnIMG() {
  const sub = getReturnSubPhase();
  // 初回表示は greet から始める（不在から戻った直後）
  if (returnMsgCache.subPhase === null) {
    returnMsgCache.subPhase = "greet";
    returnMsgCache.msg = pick(MSG_RETURN.greet);
    // greet でない時間帯なら、次の tick で切り替わる
    if (sub !== "greet") {
      returnMsgCache.subPhase = sub;
      returnMsgCache.msg = pick(MSG_RETURN[sub]);
    }
    return returnMsgCache.msg;
  }
  // 時間帯が変わったらメッセージ更新
  if (sub !== returnMsgCache.subPhase) {
    returnMsgCache.subPhase = sub;
    returnMsgCache.msg = pick(MSG_RETURN[sub]);
  }
  return returnMsgCache.msg;
}

function renderHistory() {
  const sorted = [...records].sort((a, b) => {
    const timeA = a.bedtime || a.wakeup || "";
    const timeB = b.bedtime || b.wakeup || "";
    return timeB.localeCompare(timeA);
  });

  const V = VIEW();
  if (!sorted.length) {
    V.innerHTML = '<div class="sub" style="padding:40px 0">記録なし</div>';
    return;
  }

  V.innerHTML = sorted.map(session => {
    const dur = diffMinutes(session.bedtime, session.wakeup);
    const dateStr = session.bedtime ? formatDate(session.bedtime) : (session.wakeup ? formatDate(session.wakeup) : "--");
    return '<div class="rec-row" data-id="' + session.id + '">' +
      '<div style="color:var(--color-text-sub);font-size:12px;min-width:68px">' + dateStr + '</div>' +
      '<div style="display:flex;gap:6px">' +
        '<span class="badge ' + (session.bedtime ? "on" : "off") + '">就 ' + formatTime(session.bedtime) + '</span>' +
        '<span class="badge ' + (session.wakeup ? "on" : "off") + '">起 ' + formatTime(session.wakeup) + '</span>' +
      '</div>' +
      '<div style="display:flex;align-items:center;gap:6px">' +
        '<span style="color:var(--color-warm);font-family:var(--fd);font-size:13px;min-width:60px;text-align:right">' + formatDuration(dur) + '</span>' +
        '<button class="del-btn" onclick="confirmDelete(\'' + session.id + '\')">×</button>' +
      '</div>' +
    '</div>';
  }).join("");
}

function confirmDelete(sessionId) {
  const row = document.querySelector('.rec-row[data-id="' + sessionId + '"]');
  if (!row) return;

  // 既存の確認UIがあれば消す
  const existing = row.querySelector(".confirm-row");
  if (existing) { existing.remove(); return; }

  const confirmEl = document.createElement("div");
  confirmEl.className = "confirm-row";
  confirmEl.style.cssText = "width:100%;justify-content:flex-end;margin-top:4px";
  confirmEl.innerHTML =
    '<span>削除する</span>' +
    '<button class="xs-btn" style="color:#8a5050;border-color:#5a3030" onclick="executeDelete(\'' + sessionId + '\')">○</button>' +
    '<button class="xs-btn" onclick="this.closest(\'.confirm-row\').remove()">×</button>';
  row.appendChild(confirmEl);
}

function executeDelete(sessionId) {
  deleteSession(sessionId);
  currentPhase = detectPhase();
  renderHistory();
}

        '<input type="time" class="s-in" id="setWake" value="' + settings.wakeTarget + '">' +
      '</div>' +

      /* 起床ゲート開始 */
      '<div class="s-row">' +
        '<span class="s-lbl">起床ゲート開始（目標時刻のx分前から）</span>' +
        '<input type="number" class="s-in" id="setWakeReady" value="' + settings.wakeReadyMinutes + '" min="30" max="300" step="10">' +
      '</div>' +


      /* 就寝閾値 */
      '<div style="font-size:12px;color:#8a9aaa;padding:16px 0 8px;font-family:var(--fb)">' +
        '🌙 就寝ゲート ── 時刻閾値' +
        (isAuto ? ' <span style="color:#5a6a5a">(自動)</span>' : ' <span style="color:#6a5a5a">(手動)</span>') +
(settings.thresholds ? '<button class="xs-btn" id="resetThresholds" style="margin-bottom:16px">閾値を自動計算に戻す</button>' : '') +
      '</div>' +
      '<div class="s-row">' +
        '<span class="s-lbl">早い ── 未満</span>' +
        '<input type="time" class="s-in" id="setEarly" value="' + th.early + '">' +
      '</div>' +
      '<div class="s-row">' +
        '<span class="s-lbl">適正 ── 未満</span>' +
        '<input type="time" class="s-in" id="setNormal" value="' + th.normal + '">' +
      '</div>' +
      '<div class="s-row">' +
        '<span class="s-lbl">遅い ── 未満</span>' +
        '<input type="time" class="s-in" id="setLate" value="' + th.late + '">' +
      '</div>' +
      '<div style="font-size:12px;color:#2a3038;padding:4px 0 8px">上記未満 → 深夜</div>' +

      /* 不在時間 */
      '<div style="font-size:12px;color:#8a9aaa;padding:16px 0 8px;font-family:var(--fb)">🔒 不在時間</div>' +
      '<div class="s-row">' +
        '<span class="s-lbl">不在開始</span>' +
        '<input type="time" class="s-in" id="setAwayStart" value="' + settings.awayStart + '">' +
      '</div>' +
      '<div class="s-row">' +
        '<span class="s-lbl">不在終了</span>' +
        '<input type="time" class="s-in" id="setAwayEnd" value="' + settings.awayEnd + '">' +
      '</div>' +

      /* 危険ゾーン */
      '<div style="padding-top:24px;border-top:1px solid rgba(255,255,255,0.03)">' +
        '<button class="xs-btn" id="deleteAll" style="color:#6a3030;border-color:#3a2020">\u5168\u8A18\u9332\u3092\u524A\u9664</button>' +
      '</div>' +
    '</div>';

  /* イベントリスナー */

  // 起床目標 → 閾値を自動再計算
  $("#setWake").addEventListener("change", (e) => {
    settings.wakeTarget = e.target.value;
    settings.thresholds = null;  // 自動計算に戻す
    saveSettings();
    renderSettings();  // 再描画して新しい閾値を表示
  });

  // 不在時間
  $("#setAwayStart").addEventListener("change", (e) => { settings.awayStart = e.target.value; saveSettings(); });
  $("#setAwayEnd").addEventListener("change", (e) => { settings.awayEnd = e.target.value; saveSettings(); });

  // 起床ゲート開始
  $("#setWakeReady").addEventListener("change", (e) => {
    settings.wakeReadyMinutes = parseInt(e.target.value) || 120;
    saveSettings();
  });

  // 閾値の手動変更
  ["setEarly", "setNormal", "setLate"].forEach((id, i) => {
    $("#" + id).addEventListener("change", (e) => {
      const keys = ["early", "normal", "late"];
      if (!settings.thresholds) {
        settings.thresholds = { ...autoThresholds(settings.wakeTarget) };
      }
      settings.thresholds[keys[i]] = e.target.value;
      saveSettings();
      renderSettings();
    });
  });

  // 閾値を自動に戻す
  if ($("#resetThresholds")) {
    $("#resetThresholds").onclick = () => {
      settings.thresholds = null;
      saveSettings();
      renderSettings();
    };
  }

  // 全削除
  $("#deleteAll").onclick = () => {
    if (confirm("全記録を削除する。よいな？")) {
      localStorage.removeItem(STORAGE_RECORDS);
      records = [];
      currentPhase = detectPhase();
      render();
    }
  };
}


/* ════════════════════════════════════════════════════════════
   14. タイマー・初期化
   ════════════════════════════════════════════════════════════ */

/* 30秒ごとに時計更新＋フェーズ自動遷移 */
setInterval(() => {
  // 時計の更新
  const clockEl = $("#clk");
  if (clockEl) clockEl.textContent = currentHHMM();

  // フェーズの自動遷移
  if (currentView === "gate") {
    const nextPhase = detectPhase();
    if (nextPhase !== currentPhase) {
      currentPhase = nextPhase;
      render();
    }
  }
}, 30000);

/* 初期化 */
records  = loadRecords();
settings = loadSettings();
currentPhase = detectPhase();
render();

/* Service Worker 登録 */
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js").catch(() => {});
}
</script>
</body>
</html>
