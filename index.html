<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>関門 — Gate</title>
<link rel="manifest" href="./manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e18">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Shippori+Mincho:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --fd:'Shippori Mincho',serif;
  --fb:'Noto Sans JP',sans-serif;
  --bg-bed:linear-gradient(180deg,#0a0e18 0%,#141e30 100%);
  --bg-night:linear-gradient(180deg,#060810 0%,#0c1018 50%,#10162a 100%);
  --bg-wake:linear-gradient(180deg,#12161e 0%,#201c14 100%);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:var(--bg-bed);color:#c8cdd3;font-family:var(--fb);transition:background 2s ease;overflow-x:hidden}
.app{display:flex;flex-direction:column;min-height:100vh;position:relative}
.hdr{display:flex;justify-content:space-between;align-items:center;padding:16px 20px 8px;position:relative;z-index:2}
.hdr-title{font-family:var(--fd);font-size:15px;color:#5a6272;letter-spacing:.08em}
.hdr-phase{font-family:var(--fd);font-size:12px;color:#3a4555;letter-spacing:.06em}
.tabs{display:flex;padding:0 20px;border-bottom:1px solid rgba(255,255,255,.05);position:relative;z-index:2}
.tab{padding:10px 16px;font-size:13px;color:#3a4555;background:none;border:none;border-bottom:1.5px solid transparent;cursor:pointer;font-family:var(--fb)}
.tab.on{color:#d4b96a;border-bottom-color:#d4b96a;font-weight:500}
.main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;gap:18px;position:relative;z-index:2}
.clock{font-family:var(--fd);font-size:44px;color:#d0d5dc;letter-spacing:.04em}
.sub{font-size:13px;color:#3e4a58;text-align:center}
.msg{font-family:var(--fd);font-size:15px;line-height:2;color:#b0a070;text-align:center;max-width:340px;padding:12px 0;min-height:70px}
.big-btn{width:140px;height:140px;border-radius:50%;font-family:var(--fd);font-size:18px;cursor:pointer;transition:all .4s;display:flex;align-items:center;justify-content:center;letter-spacing:.1em}
.big-btn.bed{border:1.5px solid #d4b96a;background:radial-gradient(circle at 50% 45%,rgba(255,255,255,.03),transparent 70%);color:#d4b96a;box-shadow:0 0 40px rgba(210,180,100,.06)}
.big-btn.wake{border:1.5px solid #7aaa6a;background:radial-gradient(circle at 50% 45%,rgba(255,255,255,.03),transparent 70%);color:#7aaa6a;box-shadow:0 0 40px rgba(122,170,106,.06)}
.big-btn.dim{border-color:#2a2e28;background:transparent;color:#2a2e28;box-shadow:none;cursor:default}
.big-btn.faint{opacity:.4}
.sm-btn{padding:10px 20px;border-radius:24px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02);color:#6a7080;font-family:var(--fd);font-size:13px;cursor:pointer}
.xs-btn{padding:6px 14px;border-radius:16px;border:1px solid rgba(255,255,255,.06);background:none;color:#4a4550;font-family:var(--fb);font-size:11px;cursor:pointer}
.input-lbl{font-size:12px;color:#4a5568;margin-bottom:4px}
.input{width:100%;max-width:320px;padding:10px 14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:6px;color:#c8cdd3;font-family:var(--fb);font-size:14px;outline:none}
.self-wake{font-family:var(--fd);font-size:13px;color:#4a5540;text-align:center}
.chip-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:360px}
.chip{padding:8px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02);color:#5a6070;font-family:var(--fb);font-size:13px;cursor:pointer;transition:all .2s}
.chip.on{border:1.5px solid #b0a060;background:rgba(176,160,96,.08);color:#d4c080}
.night-msg{font-family:var(--fd);font-size:15px;line-height:2.2;color:#4a5e70;text-align:center;max-width:280px}
.sleep-info{display:flex;gap:24px;justify-content:center}
.stat{text-align:center;padding:6px 0}
.stat-v{font-family:var(--fd);font-size:22px;color:#d0d5dc}
.stat-l{font-size:11px;color:#3e4a58;margin-top:2px}
.task-lbl{font-family:var(--fd);font-size:14px;color:#7a7060;text-align:center;font-style:italic}
.task-val{font-family:var(--fd);font-size:15px;color:#c0b070;text-align:center;margin-top:4px}
.task-msg{font-family:var(--fd);font-size:14px;color:#90a070;text-align:center;padding:0 0 8px}
.strk{font-size:12px;color:#6a5e4a;text-align:center;font-family:var(--fd)}
.rec-row{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.03);font-size:13px}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;font-family:var(--fb)}
.badge.on{background:rgba(210,180,100,.08);color:#a09060}
.badge.off{background:rgba(255,255,255,.02);color:#2a3038}
.s-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.s-lbl{font-size:13px;color:#6a7080}
.s-in{width:80px;padding:6px 10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:4px;color:#c8cdd3;font-family:var(--fb);font-size:14px;text-align:center;outline:none}
.confirm-row{display:flex;gap:10px;align-items:center;margin-top:4px}
.confirm-row span{font-size:12px;color:#5a4a4a;font-family:var(--fd)}
.confirm-yes{padding:6px 14px;border-radius:16px;border:1px solid #5a3030;background:none;color:#8a5050;font-family:var(--fb);font-size:11px;cursor:pointer}

/* Stars */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;transition:opacity 3s ease}
.star{position:absolute;border-radius:50%;background:#fff;animation:starTwinkle var(--dur) ease-in-out infinite;animation-delay:var(--del)}
/* Ember */
.ember{width:6px;height:6px;border-radius:50%;background:rgba(232,200,122,.3);box-shadow:0 0 16px rgba(232,200,122,.2),0 0 4px rgba(232,200,122,.4);animation:emberPulse 4s ease-in-out infinite}
/* Overlay */
.overlay{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;animation:overlayFadeIn 1.2s ease-out forwards}
.overlay.wake-ol{animation-duration:.8s}
.ov-text{animation:textFloat 1.5s ease-out both}
.ov-text.d1{animation-delay:.4s}
.ov-text.d2{animation-delay:1s}
.ov-text.d3{animation-delay:1.6s}
.overlay.wake-ol .ov-text{animation-duration:1.2s}
.overlay.wake-ol .ov-text.d1{animation-delay:.3s}
.overlay.wake-ol .ov-text.d2{animation-delay:.8s}
.overlay.wake-ol .ov-text.d3{animation-delay:1.3s}
.hidden{display:none!important}

@keyframes starTwinkle{0%,100%{opacity:.15}50%{opacity:.55}}
@keyframes emberPulse{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.65;transform:scale(1.4)}}
@keyframes overlayFadeIn{from{opacity:0}to{opacity:1}}
@keyframes textFloat{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="hdr">
    <div class="hdr-title">関門</div>
    <div class="hdr-phase" id="phaseLabel"></div>
  </div>
  <div class="tabs">
    <button class="tab on" id="tabGate" onclick="switchView('gate')">関門</button>
    <button class="tab" id="tabHistory" onclick="switchView('history')">記録</button>
    <button class="tab" id="tabSettings" onclick="switchView('settings')">設定</button>
  </div>
  <div id="view" class="main"></div>
</div>
<script>
"use strict";

/* ═══ Data ═══ */
const TASKS=[
  {id:"job",label:"求人検索",icon:"🔍",wake:["求人を探す朝だ。まず検索画面を開け。","今日の巡回が、次の一歩になるかもしれない。","探す手を止めなかったことが、貴殿の強さだ。"]},
  {id:"resume",label:"書類作業",icon:"📄",wake:["書類に向き合う朝だ。一箇所だけでも進めろ。","完璧でなくていい。手を動かせ。","昨夜決めた通り、書類を開け。それだけでいい。"]},
  {id:"study",label:"勉強・学習",icon:"📖",wake:["学びの朝だ。テキストを開け。","静かな朝は、頭に入りやすい。","この時間に学べることが、貴殿の武器になる。"]},
  {id:"spi",label:"SPI対策",icon:"✏️",wake:["SPIの朝だ。問題集を開け。まず1問。","計算は書き出せ。暗算するな。","1問でいい。解いた事実が残る。"]},
  {id:"exercise",label:"運動",icon:"🏋️",wake:["体を動かす朝だ。まず立ち上がれ。","筋肉は裏切らない。動け。","軽くでいい。体が目覚める。"]},
  {id:"other",label:"その他",icon:"──",wake:["昨夜決めたことがある。思い出せ。","やると決めた。あとは手を動かすだけだ。","起きた。それが最初の一歩だ。"]},
];
const MSG={
  bedtime:{
    early:["良い時刻である。この判断が明朝の貴殿を助ける。","上出来だ。早く寝る準備ができたのは、それだけで成果である。","まだ余裕がある。今夜の貴殿は賢明だ。","この時間に就寝に向かえるのは、昨日の自分に勝っている。","よし。明朝の自分に、今できる最善を渡せ。","静かな夜だ。その静けさのまま、眠りに入れ。","余裕を持って終えられる夜は貴重である。味わって休め。"],
    normal:["悪くない。まだ間に合う。横になれ。","目標の時間帯である。あとは眠るだけだ。","ここから先は1分が惜しい。画面を閉じろ。","十分な睡眠時間は確保できる。余計なものは見るな。","間に合った。ボタンを押して、目を閉じろ。","この時間を守れたことが、明朝への布石になる。"],
    late:["遅い。だが来た。とにかく寝ろ。","睡眠時間が削られている。今すぐ横になれ。","理由は問わない。ボタンを押して寝ろ。","遅れた分は取り戻せない。ここで止めれば最小限で済む。","明朝が厳しくなる。せめて今、目を閉じろ。","……遅くなった理由は明日聞く。今は寝ることだけ考えろ。"],
    midnight:["……何をしている。寝ろ。","これ以上起きていても良いことはない。横になれ。","明朝のことは明朝考える。今は寝ることだけに集中しろ。","遅くなった。それでも、ここに来た。ボタンを押せ。","睡眠が足りなくとも、ゼロよりは遥かにましだ。寝ろ。","私はまだここにいる。貴殿も、まだ間に合う。寝ろ。","夜更かしの理由が何であれ、今この瞬間に手放せ。"]
  },
  night:{
    deep:["まだ静かだ。眠れ。","夜は深い。目を閉じろ。","世界が息を潜めている。貴殿も休め。","……まだ早い。布団に戻れ。","灯は消えていない。安心して眠れ。"],
    predawn:["……新しい日が近い。","闇の底から、光が滲む。","東の空が動き始めた。もう少しだ。","眠りの底が透けてゆく。朝が近い。","夜明け前──最も暗く、最も静かな時間だ。","光が近づいている。もうすぐ、貴殿の時間が来る。"]
  },
  resleep:["目が覚めたか。……まだ早い。寝直せ。","中途覚醒であるな。焦る必要はない。横になれ。","起きる時間ではない。布団に戻れ。","……夜中に目が覚めることはある。考え事はするな。寝ろ。"],
  wakeup:{
    enough:["十分に眠れた。体は動く。顔を洗え。","申し分ない。今朝の時間は貴殿のものだ。","よく眠った。白湯を飲め。そこから始まる。","睡眠は足りている。あとは体を起こすだけだ。","上出来である。さあ、始めろ。","朝の空気を肺に入れろ。今日は、ここから動く。","目が覚めた。それだけで、今日は昨日と違う。"],
    short:["短いが、動ける。白湯を飲め。","万全ではないが、この時間に起きた判断は正しい。","少し足りないが、問題ない。やれることはある。","起きたこと自体が今日の成果の一つだ。","昨夜もう少し早ければ……だが、今朝はここにいる。それでいい。","完璧でなくても構わない。起きた。それが全てだ。"],
    veryShort:["……短い。無理はするな。だが、起きたことを認める。","厳しいかもしれない。できる範囲でやれ。","少ない。だが起きた。それだけで前に進んでいる。","無理はするな。一つだけやって、あとは体と相談しろ。","今日は量より質で攻めろ。短時間でも集中できればいい。","起き上がっただけで、貴殿は昨日の自分を超えている。"]
  },
  taskReminder:["昨夜、貴殿はこう決めた──","寝る前に宣言したことがある──","昨夜の自分が、今朝の自分に託した仕事──"],
  streakBed:["就寝ゲート {n}日連続通過。習慣が形になりつつある。","{n}日続いている。貴殿の意志が数字に現れている。","連続{n}日。積み重ねは裏切らない。"],
  streakWake:["起床ゲート {n}日連続通過。体が覚え始めている。","{n}日連続。自己覚醒の回路が繋がりつつある。","連続{n}日。この朝も、貴殿は来た。"]
};
const PNAME={bed:"夜 ── 就寝",night:"夜更け",wake:"朝 ── 起床","wake-done":"朝 ── 通過済"};
const DEFS={wakeTarget:"05:00",thresholds:{early:"23:00",normal:"23:30",late:"00:00"}};

/* ═══ Helpers ═══ */
const $=s=>document.querySelector(s);
const pick=a=>a[Math.floor(Math.random()*a.length)];
const pad=n=>String(n).padStart(2,"0");
const todayS=()=>new Date().toISOString().slice(0,10);
const yesterdayS=()=>new Date(Date.now()-864e5).toISOString().slice(0,10);
const hhmmNow=()=>{const d=new Date();return pad(d.getHours())+":"+pad(d.getMinutes())};
const fmtT=iso=>{if(!iso)return"--:--";const d=new Date(iso);return pad(d.getHours())+":"+pad(d.getMinutes())};
const diffM=(a,b)=>{if(!a||!b)return null;return Math.round((new Date(b)-new Date(a))/6e4)};
const fmtD=m=>{if(m==null)return"--";const h=Math.floor(m/60),r=m%60;return h+"時間"+(r>0?r+"分":"")};
const toM=s=>{const[h,m]=s.split(":").map(Number);return h*60+m};
const sleepL=t=>{const n=new Date(),[h,m]=t.split(":").map(Number),x=new Date(n);x.setHours(h,m,0,0);if(x<=n)x.setDate(x.getDate()+1);return Math.round((x-n)/6e4)};
const bedCat=th=>{const h=new Date().getHours(),m=new Date().getMinutes(),n=h*60+m;if(h>=0&&h<5)return"midnight";if(n<toM(th.early))return"early";if(n<toM(th.normal))return"normal";if(toM(th.late)===0||n<toM(th.late))return"late";return"midnight"};
const wakeCat=m=>{if(m==null||m>=360)return"enough";if(m>=300)return"short";return"veryShort"};
const getStreak=(recs,f)=>{let c=0;for(const r of[...recs].sort((a,b)=>b.date.localeCompare(a.date))){if(r[f])c++;else break}return c};
const fDate=ds=>{const d=new Date(ds+"T00:00:00");return(d.getMonth()+1)+"/"+d.getDate()+" ("+"日月火水木金土"[d.getDay()]+")"};

/* ═══ Storage ═══ */
const RK="gate.records.v3",SK="gate.settings.v3";
let recs,settings;
function loadR(){try{return JSON.parse(localStorage.getItem(RK))||[]}catch{return[]}}
function saveR(){localStorage.setItem(RK,JSON.stringify(recs))}
function loadS(){try{return{...DEFS,...JSON.parse(localStorage.getItem(SK))}}catch{return{...DEFS}}}
function saveS(){localStorage.setItem(SK,JSON.stringify(settings))}
recs=loadR();settings=loadS();

/* ═══ Phase Detection ═══ */
function detectPhase(){
  const t=todayS(),y=yesterdayS();
  const tR=recs.find(r=>r.date===t),yR=recs.find(r=>r.date===y);
  if(tR?.wakeup)return"wake-done";
  const bed=tR?.bedtime?tR:(yR?.bedtime?yR:null);
  if(!bed?.bedtime)return"bed";
  const now=new Date(),[wh,wm]=settings.wakeTarget.split(":").map(Number);
  const wt=new Date(now);wt.setHours(wh,wm,0,0);
  const h=now.getHours();
  if(h>=0&&h<wh+1)return now<wt?"night":"wake";
  if(h>=17)return"night";
  return"wake";
}
let phase=detectPhase();
let view="gate";

/* ═══ Rendering ═══ */
const V=$("#view");

function setBackground(p){
  const bgs={bed:"linear-gradient(180deg,#0a0e18 0%,#141e30 100%)",night:"linear-gradient(180deg,#060810 0%,#0c1018 50%,#10162a 100%)",wake:"linear-gradient(180deg,#12161e 0%,#201c14 100%)","wake-done":"linear-gradient(180deg,#12161e 0%,#201c14 100%)",history:"linear-gradient(180deg,#0a0e14 0%,#12182a 100%)",settings:"linear-gradient(180deg,#0a0e14 0%,#12182a 100%)"};
  document.body.style.background=bgs[p]||bgs.bed;
}

function switchView(v){
  view=v;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("on"));
  $(v==="gate"?"#tabGate":v==="history"?"#tabHistory":"#tabSettings").classList.add("on");
  render();
}

function render(){
  const p=view==="gate"?phase:view;
  setBackground(p);
  $("#phaseLabel").textContent=view==="gate"?(PNAME[phase]||""):"";
  if(view==="gate"){
    if(phase==="bed")renderBed();
    else if(phase==="night")renderNight();
    else if(phase==="wake")renderWake(false);
    else renderWake(true);
  }else if(view==="history")renderHistory();
  else renderSettings();
}

/* ── Stars ── */
function makeStars(container,count=35){
  const div=document.createElement("div");div.className="stars";
  for(let i=0;i<count;i++){const s=document.createElement("div");s.className="star";
    s.style.left=Math.random()*100+"%";s.style.top=Math.random()*100+"%";
    const sz=Math.random()<.15?2.5:Math.random()<.4?1.8:1.2;
    s.style.width=sz+"px";s.style.height=sz+"px";
    s.style.setProperty("--dur",(3+Math.random()*4)+"s");
    s.style.setProperty("--del",Math.random()*5+"s");
    div.appendChild(s);
  }
  container.appendChild(div);
}

/* ── Bed Phase ── */
let selectedTask=null;
function renderBed(){
  const cat=bedCat(settings.thresholds);
  const m=pick(MSG.bedtime[cat]);
  const mins=sleepL(settings.wakeTarget);
  const stk=getStreak(recs,"bedtime");
  selectedTask=null;
  V.innerHTML=`
    <div class="clock" id="bedClock">${hhmmNow()}</div>
    <div class="sub">${settings.wakeTarget} 起床まで ${fmtD(mins)}</div>
    ${stk>=2?`<div class="strk">${pick(MSG.streakBed).replace("{n}",stk)}</div>`:""}
    <div class="msg">${m}</div>
    <div class="input-lbl">明朝やること</div>
    <div class="chip-row" id="chips">${TASKS.map(t=>`<button class="chip" data-id="${t.id}">${t.icon} ${t.label}</button>`).join("")}</div>
    <div id="otherWrap" class="hidden"><input class="input" id="otherInput" placeholder="具体的に一言"></div>
    <div class="self-wake">「${settings.wakeTarget} に起きる」──意識してから眠れ。</div>
    <button class="big-btn bed faint" id="sleepBtn" disabled>就寝する</button>`;
  document.querySelectorAll(".chip").forEach(c=>{
    c.onclick=()=>{
      document.querySelectorAll(".chip").forEach(x=>x.classList.remove("on"));
      c.classList.add("on");selectedTask=c.dataset.id;
      $("#otherWrap").classList.toggle("hidden",selectedTask!=="other");
      const btn=$("#sleepBtn");btn.disabled=false;btn.classList.remove("faint");
    };
  });
  $("#sleepBtn").onclick=doSleep;
}
function doSleep(){
  if(!selectedTask)return;
  // Show overlay
  const tl=TASKS.find(t=>t.id===selectedTask)?.label||"";
  const ft=selectedTask==="other"&&$("#otherInput")?`${tl}：${$("#otherInput").value.trim()||""}`:tl;
  const ol=document.createElement("div");ol.className="overlay";
  ol.style.background="rgba(4,6,10,0.95)";
  ol.innerHTML=`
    <div class="ov-text d1" style="font-family:var(--fd);font-size:22px;color:#8a9aaa;letter-spacing:.2em">おやすみ</div>
    <div class="ov-text d2" style="font-family:var(--fd);font-size:13px;color:#3a4a5a;letter-spacing:.08em">${settings.wakeTarget} に、また会おう</div>
    <div class="ov-text d3 ember"></div>`;
  document.body.appendChild(ol);
  setTimeout(()=>{
    const now=new Date().toISOString(),td=todayS();
    const ex=recs.find(r=>r.date===td);
    if(ex){ex.bedtime=now;ex.task=ft;ex.taskId=selectedTask;}
    else recs.push({date:td,bedtime:now,wakeup:null,task:ft,taskId:selectedTask});
    saveR();phase=detectPhase();
    ol.remove();render();
  },3000);
}

/* ── Night Phase ── */
function renderNight(){
  const h=new Date().getHours(),[wh]=settings.wakeTarget.split(":").map(Number);
  const pre=(h>=Math.max(0,wh-2)&&h<wh)||(h>=3&&h<wh);
  const m=pick(pre?MSG.night.predawn:MSG.night.deep);
  const mins=sleepL(settings.wakeTarget);
  V.innerHTML=`
    <div class="clock" style="color:#3a4a5a;font-size:32px" id="nightClock">${hhmmNow()}</div>
    <div class="sub" style="color:#2a3540">${settings.wakeTarget} まで ${fmtD(mins)}</div>
    <div class="night-msg" id="nightMsg">${m}</div>
    <div class="ember"></div>
    <div style="display:flex;gap:12px;align-items:center">
      <button class="sm-btn" id="resleepBtn">寝直す</button>
      <button class="xs-btn" id="resetBedBtn">就寝を取消</button>
    </div>
    <div id="confirmArea" class="hidden"></div>`;
  makeStars(V);
  $("#resleepBtn").onclick=()=>{
    const now=new Date().toISOString(),td=todayS(),yd=yesterdayS();
    const tr=recs.find(r=>r.date===td);
    if(tr)tr.bedtime=now;
    else{const yr=recs.find(r=>r.date===yd);if(yr)yr.bedtime=now;}
    saveR();
    $("#nightMsg").textContent=pick(MSG.resleep);
    setTimeout(()=>{const h2=new Date().getHours();const pre2=(h2>=Math.max(0,wh-2)&&h2<wh)||(h2>=3&&h2<wh);$("#nightMsg").textContent=pick(pre2?MSG.night.predawn:MSG.night.deep);},8000);
  };
  $("#resetBedBtn").onclick=()=>{
    $("#confirmArea").classList.remove("hidden");
    $("#confirmArea").innerHTML=`<div class="confirm-row"><span>就寝記録を消す？</span><button class="confirm-yes" id="cfYes">はい</button><button class="xs-btn" id="cfNo">いいえ</button></div>`;
    $("#cfYes").onclick=()=>{
      const td=todayS(),yd=yesterdayS();
      recs=recs.map(r=>(r.date===td||r.date===yd)?{...r,bedtime:null,task:null,taskId:null}:r).filter(r=>r.bedtime||r.wakeup);
      saveR();phase=detectPhase();render();
    };
    $("#cfNo").onclick=()=>$("#confirmArea").classList.add("hidden");
  };
}

/* ── Wake Phase ── */
function renderWake(done){
  const td=todayS(),yd=yesterdayS();
  const stk=getStreak(recs,"wakeup");
  if(done){
    const rec=recs.find(r=>r.date===td);
    if(!rec?.wakeup){V.innerHTML=`<div class="msg">記録なし</div>`;return;}
    showWakeResult(rec,rec.wakeup,stk);
    return;
  }
  V.innerHTML=`
    <div class="clock" id="wakeClock">${hhmmNow()}</div>
    <div class="sub">目が覚めたなら、ボタンを押せ。</div>
    <div class="msg" id="wakeMsg"></div>
    <button class="big-btn wake" id="wakeBtn">起きた</button>`;
  $("#wakeBtn").onclick=doWake;
}
function doWake(){
  const now=new Date().toISOString(),td=todayS(),yd=yesterdayS();
  let bedRec=recs.find(r=>r.date===td);
  if(!bedRec?.bedtime)bedRec=recs.find(r=>r.date===yd);
  // Show overlay
  const ol=document.createElement("div");ol.className="overlay wake-ol";
  ol.style.background="radial-gradient(ellipse at 50% 40%,rgba(40,36,24,.95),rgba(10,12,16,.97))";
  ol.innerHTML=`
    <div class="ov-text d1" style="font-family:var(--fd);font-size:22px;color:#b8a870;letter-spacing:.2em">おはよう</div>
    <div class="ov-text d2" style="font-family:var(--fd);font-size:13px;color:#6a6050;letter-spacing:.08em">今日も、此処に来た</div>
    <div class="ov-text d3" style="width:40px;height:1px;background:linear-gradient(90deg,transparent,rgba(200,180,120,.2),transparent)"></div>`;
  document.body.appendChild(ol);
  setTimeout(()=>{
    const ex=recs.find(r=>r.date===td);
    if(ex){ex.wakeup=now;ex.bedtime=ex.bedtime||bedRec?.bedtime;ex.task=ex.task||bedRec?.task;ex.taskId=ex.taskId||bedRec?.taskId;}
    else recs.push({date:td,bedtime:bedRec?.bedtime,wakeup:now,task:bedRec?.task,taskId:bedRec?.taskId});
    saveR();phase=detectPhase();
    ol.remove();render();
  },2800);
}
function showWakeResult(rec,wakeIso,stk){
  const dur=diffM(rec.bedtime,wakeIso);
  const cat=wakeCat(dur);
  const m=pick(MSG.wakeup[cat]);
  const tc=TASKS.find(t=>t.id===rec.taskId);
  const tm=tc?pick(tc.wake):"";
  const trem=rec.task?pick(MSG.taskReminder):"";
  const dc=dur>=360?"#6a9a5a":dur>=300?"#a09060":"#9a5a5a";
  V.innerHTML=`
    <div class="clock">${hhmmNow()}</div>
    ${stk>=2?`<div class="strk">${pick(MSG.streakWake).replace("{n}",stk)}</div>`:""}
    <div class="sleep-info">
      ${rec.bedtime?`<div class="stat"><div class="stat-v">${fmtT(rec.bedtime)}</div><div class="stat-l">就寝</div></div>`:""}
      <div class="stat"><div class="stat-v">${fmtT(wakeIso)}</div><div class="stat-l">起床</div></div>
      <div class="stat"><div class="stat-v" style="color:${dc}">${fmtD(dur)}</div><div class="stat-l">睡眠</div></div>
    </div>
    <div class="msg">${m}</div>
    ${tm?`<div class="task-msg">${tm}</div>`:""}
    ${trem?`<div class="task-lbl">${trem}</div><div class="task-val">「${rec.task}」</div>`:""}
    <button class="big-btn wake dim" disabled>通過済</button>`;
}

/* ── History ── */
function renderHistory(){
  const sorted=[...recs].sort((a,b)=>b.date.localeCompare(a.date));
  if(!sorted.length){V.innerHTML=`<div class="sub" style="padding:40px 0">記録なし</div>`;return;}
  V.innerHTML=sorted.map(r=>{
    const dur=diffM(r.bedtime,r.wakeup);
    return`<div class="rec-row">
      <div style="color:#4a5568;font-size:12px;min-width:68px">${fDate(r.date)}</div>
      <div style="display:flex;gap:6px;align-items:center">
        <span class="badge ${r.bedtime?"on":"off"}">就 ${r.bedtime?fmtT(r.bedtime):"--:--"}</span>
        <span class="badge ${r.wakeup?"on":"off"}">起 ${r.wakeup?fmtT(r.wakeup):"--:--"}</span>
      </div>
      <div style="color:#a09060;font-family:var(--fd);font-size:13px;min-width:72px;text-align:right">${fmtD(dur)}</div>
    </div>`;
  }).join("");
}

/* ── Settings ── */
function renderSettings(){
  V.innerHTML=`
    <div style="padding:0;width:100%;max-width:400px">
      <div class="s-row"><span class="s-lbl">起床目標時刻</span><input type="time" class="s-in" id="sWake" value="${settings.wakeTarget}"></div>
      <div style="font-size:12px;color:#3a4555;padding:16px 0 8px;font-family:var(--fd)">就寝ゲート ── 時刻閾値</div>
      <div class="s-row"><span class="s-lbl">早い ── 未満</span><input type="time" class="s-in" id="sEarly" value="${settings.thresholds.early}"></div>
      <div class="s-row"><span class="s-lbl">適正 ── 未満</span><input type="time" class="s-in" id="sNormal" value="${settings.thresholds.normal}"></div>
      <div class="s-row"><span class="s-lbl">遅い ── 未満</span><input type="time" class="s-in" id="sLate" value="${settings.thresholds.late}"></div>
      <div style="font-size:12px;color:#2a3038;padding:4px 0 16px">上記未満 → 深夜</div>
      <div style="padding-top:24px;border-top:1px solid rgba(255,255,255,.03)">
        <button class="xs-btn" id="delAll" style="color:#6a3030;border-color:#3a2020">全記録を削除</button>
      </div>
    </div>`;
  const bind=(id,fn)=>$(id).addEventListener("change",fn);
  bind("#sWake",e=>{settings.wakeTarget=e.target.value;saveS()});
  bind("#sEarly",e=>{settings.thresholds.early=e.target.value;saveS()});
  bind("#sNormal",e=>{settings.thresholds.normal=e.target.value;saveS()});
  bind("#sLate",e=>{settings.thresholds.late=e.target.value;saveS()});
  $("#delAll").onclick=()=>{if(confirm("全記録を削除する。よろしいか？")){localStorage.removeItem(RK);recs=[];phase=detectPhase();render();}};
}

/* ═══ Clock tick & auto-phase ═══ */
setInterval(()=>{
  const c=document.querySelector("#bedClock,#nightClock,#wakeClock");
  if(c)c.textContent=hhmmNow();
  if(view==="gate"){const np=detectPhase();if(np!==phase){phase=np;render();}}
},30000);

/* ═══ Init ═══ */
render();

/* ═══ SW ═══ */
if("serviceWorker"in navigator)navigator.serviceWorker.register("./sw.js").catch(()=>{});
</script>
</body>
</html>
