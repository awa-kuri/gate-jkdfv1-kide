<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>関門 — Gate</title>
<link rel="manifest" href="./manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#1a1a2e">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Shippori+Mincho:wght@400;500&display=swap" rel="stylesheet">

<style>

:root{--fd:'Shippori Mincho',serif;--fb:'Noto Sans JP',sans-serif}

*{ box-sizing: border-box; margin: 0; padding: 0; }

html, body {overscroll-behavior: none;}

body{
background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
color:#c8cdd3;font-family:var(--fb);
transition:background 2s ease;overflow-x:hidden}

.app{display:flex;flex-direction:column;min-height:100vh;position:relative}

.hdr{display:flex;justify-content:space-between;align-items:center;padding:16px 20px 8px;padding-top:calc(16px + env(safe-area-inset-top,0px));margin-inline: auto; width: 100%;position:relative;z-index:2}

.hdr-title{font-family:var(--fd);font-size:15px;font-weight:600;color:#5a6272;letter-spacing:1.08em}
.hdr-phase{font-family:var(--fd);font-size:15px;color:#3a4555;letter-spacing:.06em}
.tabs{display:flex;padding:0 20px;border-bottom:1px solid rgba(255,255,255,.05);position:relative;z-index:2}
.tab{padding:10px 16px;font-size:13px;color:#3a4555;background:none;border:none;border-bottom:1.5px solid transparent;cursor:pointer;font-family:var(--fb)}
.tab.on{color:#d4b96a;border-bottom-color:#d4b96a;font-weight:500}
.main{flex:1;display:flex;flex-direction:column;align-items:center;padding:24px 20px;gap:16px;position:relative;z-index:2;padding-bottom:calc(24px + env(safe-area-inset-bottom,0px))}

/* 1. 配置の安定化：centeredでも上下の余白を固定する */
.main.centered {
  justify-content: flex-start; /* centerから変更。上からの位置を固定するため */
  padding-top: 20px; /* 画面中央付近に見えるよう調整。好みの高さでOK */
}

.main.top{justify-content:flex-start;padding-top:20px}

/* 2. カードのサイズ固定（共通設定） */
.card {
  background: rgba(255, 255, 255, .03);
  border: 1px solid rgba(255, 255, 255, .08);
  border-radius: 16px;
  padding: 24px 28px;
  backdrop-filter: blur(10px);
  box-shadow: 0 8px 32px rgba(0, 0, 0, .3);
  max-width: 380px;
  width: 100%;
  text-align: center;
  /* 最小高さを設定して、中身が少なくてもカードが縮まないようにする */
  min-height: 220px; 
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.clock{font-family:var(--fd);font-size:44px;color:#d0d5dc;letter-spacing:.04em}
.sub{font-size:13px;color:#4a5568;text-align:center;line-height:1.6}
.msg {
  font-family: var(--fd);
  font-size: 12px;
  line-height: 1.8;
  color: #b0a070;
  text-align: center;
  max-width: 320px;
  padding: 0;
  min-height: 3.6em; /* 2行分を最低限確保 */
  display: flex;
  align-items: center;
  justify-content: center;
}
.accent{display:inline-block;width:40px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);margin:8px 0}
.big-btn{width:170px;height:170px;border-radius:50%;font-family:var(--fd);font-size:18px;cursor:pointer;transition:all .4s;display:flex;align-items:center;justify-content:center;letter-spacing:.1em;position:relative;overflow:hidden}
.big-btn.bed{border:1.5px solid #d4b96a;background:radial-gradient(circle at 50% 45%,rgba(255,255,255,.03),transparent 70%);color:#d4b96a;box-shadow:0 0 40px rgba(210,180,100,.06)}
.big-btn.wake{border:1.5px solid #7aaa6a;background:radial-gradient(circle at 50% 45%,rgba(255,255,255,.03),transparent 70%);color:#7aaa6a;box-shadow:0 0 40px rgba(122,170,106,.06)}
.big-btn.dim{border-color:#2a2e28!important;background:transparent!important;color:#2a2e28!important;box-shadow:none!important;cursor:default}
.big-btn.faint{opacity:.35}
.sm-btn{padding:10px 20px;border-radius:24px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02);color:#6a7080;font-family:var(--fd);font-size:13px;cursor:pointer}
.xs-btn{padding:6px 14px;border-radius:16px;border:1px solid rgba(255,255,255,.06);background:none;color:#4a4550;font-family:var(--fb);font-size:11px;cursor:pointer}
.input-lbl{font-size:12px;color:#4a5568}
.input{width:100%;max-width:320px;padding:10px 14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:6px;color:#c8cdd3;font-family:var(--fb);font-size:14px;outline:none}
.self-wake{font-family:var(--fd);font-size:13px;color: rgba(255, 255, 255, 0.5);text-align:center}
.chip-row{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:360px}
.chip{padding:8px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02);color:#5a6070;font-family:var(--fb);font-size:13px;cursor:pointer;transition:all .2s}
.chip.on{border:1.5px solid #b0a060;background:rgba(176,160,96,.08);color:#d4c080}
.chip.wrong{border-color:#6a3030;color:#8a4040;animation:shake .4s ease}
.night-msg{font-family:var(--fd);font-size:15px;line-height:2.2;color:#4a5e70;text-align:center;max-width:280px; min-height: 3.2em;display: flex;align-items: center;justify-content: center;}

.stars{position:fixed;inset:0;pointer-events:none;z-index:0;transition:opacity 3s}

.star {
  position: absolute;
  border-radius: 50%;
  background: #fff;
  /* 初期状態をアニメーションの開始点に合わせる */
  opacity: .15; 
  animation: starTwinkle var(--dur) ease-in-out infinite;
  animation-delay: var(--del);
}

.light-particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.light-p{position:absolute;border-radius:50%;animation:floatUp var(--dur) ease-in infinite;animation-delay:var(--del);opacity:0}

.hold-ring{position:relative;width:180px;height:180px}
.hold-ring svg{position:absolute;inset:0;transform:rotate(-90deg)}
.hold-ring circle.track{fill:none;stroke:rgba(255,255,255,.06);stroke-width:3}
.hold-ring circle.fill{fill:none;stroke:#7aaa6a;stroke-width:3;stroke-linecap:round}
.hold-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:var(--fd);color:#7aaa6a;letter-spacing:.08em;cursor:pointer;-webkit-user-select:none;user-select:none}
.hold-label{font-size:16px}.hold-sub{font-size:11px;color:#5a6a5a;margin-top:4px;}

.sunrise-bg{position:fixed;inset:0;z-index:0;pointer-events:none;transition:background .3s ease}

.sleep-info{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;}
.stat{text-align:center;padding:4px 0}.stat-v{font-family:var(--fd);font-size:20px;color:#d0d5dc}.stat-l{font-size:11px;color:#4a5568;margin-top:2px}
.task-lbl{font-family:var(--fd);font-size:13px;color:#7a7060;text-align:center}
.task-val{font-family:var(--fd);font-size:14px;color:#c0b070;text-align:center;margin-top:4px}
.task-msg{font-family:var(--fd);font-size:13px;color:#7a7060;text-align:center;padding:0 0 4px}

/* 3. 各テキストエリアの高さ確保 */
.strk {
  font-size: 12px;
  color: #6a5e4a;
  text-align: center;
  font-family: var(--fd);
  height: 20px; /* 高さを固定 */
  line-height: 20px;
}

.rec-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:13px;width:100%;max-width:400px}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;font-family:var(--fb)}
.badge.on{background:rgba(210,180,100,.08);color:#a09060}.badge.off{background:rgba(255,255,255,.02);color:#2a3038}
.s-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.03);width:100%;max-width:400px}
.s-lbl{font-size:13px;color:#6a7080}
.s-in{width:80px;padding:6px 10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:4px;color:#c8cdd3;font-family:var(--fb);font-size:14px;text-align:center;outline:none}
.confirm-row{display:flex;gap:10px;align-items:center;margin-top:4px}
.confirm-row span{font-size:12px;color:#5a4a4a;font-family:var(--fd)}
.overlay{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;animation:overlayFadeIn 1.2s ease-out forwards}
.overlay.wake-ol{animation-duration:.8s}
.ov-text{animation:textFloat 1.5s ease-out both}
.ov-text.d1{animation-delay:.4s}.ov-text.d2{animation-delay:1s}.ov-text.d3{animation-delay:1.6s}
.overlay.wake-ol .ov-text{animation-duration:1.2s}
.overlay.wake-ol .ov-text.d1{animation-delay:.3s}.overlay.wake-ol .ov-text.d2{animation-delay:.8s}.overlay.wake-ol .ov-text.d3{animation-delay:1.3s}

.hidden{display:none!important}

@keyframes starTwinkle{0%,100%{opacity:.15}50%{opacity:.55}}

@keyframes overlayFadeIn{from{opacity:0}to{opacity:1}}

@keyframes textFloat{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
@keyframes floatUp{0%{opacity:0;transform:translateY(0)}15%{opacity:.6}85%{opacity:.4}100%{opacity:0;transform:translateY(calc(-100vh - 40px))}}

/* フェードイン */
.view-fade {
  animation: viewFadeIn 0.4s ease-out forwards;
}

@keyframes viewFadeIn {
  from { opacity: 0;}
  to { opacity: 1;}
}


/* 4. 入力エリアのガタつき防止（renderBed用） */
#otherWrap {
  height: 50px; /* 入力欄1行分のスペース */
  display: flex;
  align-items: center;
  justify-content: center;
}
#otherWrap.hidden {
  display: none; /* hiddenの時は消すが、親要素で高さを確保していればOK */
}

</style>
</head>

<body>
<div class="app">
<div class="hdr">
 <div class="hdr-title">関門</div>
  <div class="hdr-phase" id="phaseLabel"></div>
 </div>
 <div class="tabs">
  <button class="tab on" id="tabGate" onclick="switchView('gate')">関門</button>
  <button class="tab" id="tabHistory" onclick="switchView('history')">記録</button>
  <button class="tab" id="tabSettings" onclick="switchView('settings')">設定</button>
 </div>

<div id="view" class="main centered"></div></div>

<script>

"use strict";

const TASKS=[

{id:"job",label:"求人検索",icon:"🔍",wake:["求人を探す朝だ。まず検索画面を開け。","今日の巡回が、次の一歩になるかもしれない。","探す手を止めなかったことが、貴殿の強さだ。"]},

{id:"resume",label:"書類作業",icon:"📄",wake:["書類に向き合う朝だ。一箇所だけでも進めろ。","完璧でなくていい。手を動かせ。","昨夜決めた通り、書類を開け。それだけでいい。"]},

{id:"study",label:"勉強・学習",icon:"📖",wake:["学びの朝だ。テキストを開け。","静かな朝は、頭に入りやすい。","この時間に学べることが、貴殿の武器になる。"]},

{id:"spi",label:"SPI対策",icon:"✏️",wake:["SPIの朝だ。問題集を開け。まず1問。","計算は書き出せ。暗算するな。","1問でいい。解いた事実が残る。"]},

{id:"exercise",label:"運動",icon:"🏋️",wake:["体を動かす朝だ。まず立ち上がれ。","筋肉は裏切らない。動け。","軽くでいい。体が目覚める。"]},

{id:"other",label:"その他",icon:"📍",wake:["昨夜決めたことがある。思い出せ。","やると決めた。あとは手を動かすだけだ。","起きた。それが最初の一歩だ。"]}];


const MSG={

bedtime:{

early:["眠るには良い時刻である。","上出来だ。早く寝る。それだけで成果である。","まだ余裕がある。今夜の貴殿は賢明だ。","今夜は勝ちである。この貯金が明朝に効く。","明朝の自分に、今できる最善を渡せ。","静かな夜だ。その静けさのまま、眠りに入れ。","余裕を持って終えられる夜は貴重であるな。","夜は判断力が低下する。早く手放して正解だ。"],

 normal:["悪くない。まだ間に合う。横になれ。","目標の時間帯である。あとは眠るだけだ。","ここから先は1分が惜しい。画面を閉じろ。","十分な睡眠時間は確保できる。余計なものは見るな。","間に合った。ボタンを押して、目を閉じろ。","この時間を守れたことが、明朝への布石になる。","目を閉じてから眠りに落ちるまでの時間も計算に入れろ。","よし、ここで止められた。十分だ。"],

late:["遅い。だが来た。とにかく寝ろ。","睡眠時間が削られている。今すぐ横になれ。","理由は問わない。ボタンを押して寝ろ。","遅れた分は取り戻せない。ここで止めれば最小限で済む。","明朝が厳しくなる。せめて今、目を閉じろ。","……遅くなった理由は明日聞く。今は寝ることだけ考えろ。","……それでも、来たことは認める。寝ろ。","後悔するのは明日でいい。今は布団に入れ。"],

midnight:["……何をしている。寝ろ。","これ以上起きていても良いことはない。横になれ。","明朝のことは明朝考える。今は寝ることだけに集中しろ。","遅くなった。それでも、ここに来た。ボタンを押せ。","睡眠が足りなくとも、ゼロよりは遥かにましだ。寝ろ。","私はまだここにいる。貴殿も、まだ間に合う。寝ろ。","夜更かしの理由が何であれ、今この瞬間に手放せ。","夜は思考を歪める。今考えていることは全て明日に回せ。","……もう十分だ。何をしていたとしても、ここで終われ。","深夜に正しい判断はできない。唯一の正解は眠ることだ。"]

},

night:{

deep:["まだ静かだ。眠れ。","夜は深い。目を閉じろ。","世界が息を潜めている。貴殿も休め。","……まだ早い。布団に戻れ。","灯は消えていない。安心して眠れ。","何も考えなくていい。ただ横になっていろ。","……目を閉じていろ。それだけでいい。","私はここにいる。貴殿は眠れ。"],

predawn:["……新しい日が近い。","闇の底から、光が滲む。","東の空が動き始めた。もう少しだ。","夜の底が透けてゆく。朝が近い。","夜明け前──最も暗く、最も静かな時間だ。","光が近づいている。じきに朝が来る。","空が変わり始めた。感じるか。","いずれ朝が来る。今はまだ眠れ。","……星が、薄くなっていくな。"]

},

resleep:["目が覚めたか。……まだ早い。寝直せ。","中途覚醒であるな。焦る必要はない。横になれ。","起きる時間ではない。布団に戻れ。","……夜中に目が覚めることはある。","……時計を見るな。見ると眠れなくなる。目を閉じろ。","呼吸だけに集中しろ。吸って、吐く…。","まだ暗い。眠れるだろう。"],


wakeup:{

enough:["十分に眠れた。体は動く。顔を洗え。","申し分ない。今朝の時間は我等のものだ。","よく眠った。白湯を飲め。そこから始まる。","睡眠は足りている。あとは体を起こすだけだ。","上出来である。さあ、始めろ。","朝の空気を肺に入れろ。","体は十分に休んだ。あとは意志の問題だ。立て。","静かな朝を手に入れた。この時間を無駄にするな。"],

short:["短いが、動ける。白湯を飲め。","万全ではないが、この時間に起きた判断は正しい。","少し足りないが、問題ない。やれることはある。","起きたこと自体が今日の成果の一つだ。","昨夜もう少し早ければ……だが、今朝はここにいる。それでいい。","完璧でなくても構わない。起きた。それが全てだ。","足りない分は白湯で補え。体を内側から起こせ。","眠いのは最初の10分だ。動き出せば消える。"],

veryShort:["……短い。無理はするな。","厳しいかもしれない。できる範囲でやれ。","少ない。だが起きた。それだけで前に進んでいる。","無理はするな。一つだけやって、あとは体と相談しろ。","今日は量より質で攻めろ。短時間でも集中できればいい。","無理をするな。一つ片付けたら、休んでもいい。"]

},


taskReminder:["昨夜の自分が、今朝の自分に渡したものがある。","またここから始まる。","今日も、一歩。"],

streakBed:["就寝ゲート {n}日連続通過。習慣が形になりつつある。","{n}日続いている。貴殿の意志が数字に現れている。","連続{n}日。積み重ねは裏切らない。"],streakWake:["起床ゲート {n}日連続通過。体が覚え始めている。","{n}日連続。自己覚醒の回路が繋がりつつある。","連続{n}日。この朝も、貴殿は来た。"]

};


const PNAME={bed:"夜 ─ 就寝",night:"夜更け",wake:"朝 ─ 起床","wake-done":"朝 ─ 通過済"},


DEFS={wakeTarget:"05:00",thresholds:{early:"23:00",normal:"23:30",late:"00:00"}};
const $=s=>document.querySelector(s),pick=a=>a[Math.floor(Math.random()*a.length)],pad=n=>String(n).padStart(2,"0");

// 起床目標の1時間前を日付の切り替わり目にする
const getBoundary = () => {
  const [wh] = settings.wakeTarget.split(":").map(Number);
  // 目標が5時なら4時、4時なら3時を境界にする（最低でも深夜0時は確保）
  return Math.max(0, wh - 1); 
};

const todayS = () => {
  const d = new Date(Date.now() - getBoundary() * 36e5);
  return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate());
};

const yesterdayS = () => {
  const d = new Date(Date.now() - (24 + getBoundary()) * 36e5);
  return d.getFullYear() + "-" + pad(d.getMonth() + 1) + "-" + pad(d.getDate());
};

const hm=()=>{const d=new Date();return pad(d.getHours())+":"+pad(d.getMinutes())};
const fmtT=i=>{if(!i)return"--:--";const d=new Date(i);return pad(d.getHours())+":"+pad(d.getMinutes())};
const diffM=(a,b)=>{if(!a||!b)return null;return Math.round((new Date(b)-new Date(a))/6e4)};
const fmtD=m=>{if(m==null)return"--";return Math.floor(m/60)+"時間"+(m%60>0?m%60+"分":"")};
const toM=s=>{const[h,m]=s.split(":").map(Number);return h*60+m};
const sleepL=t=>{const n=new Date(),[h,m]=t.split(":").map(Number),x=new Date(n);x.setHours(h,m,0,0);if(x<=n)x.setDate(x.getDate()+1);return Math.round((x-n)/6e4)};
const bedCat=th=>{const h=new Date().getHours(),m=new Date().getMinutes(),n=h*60+m;if(h>=0&&h<5)return"midnight";if(n<toM(th.early))return"early";if(n<toM(th.normal))return"normal";if(toM(th.late)===0||n<toM(th.late))return"late";return"midnight"};
const wakeCat=m=>{if(m==null||m>=360)return"enough";if(m>=300)return"short";return"veryShort"};
const getStreak=(r,f)=>{let c=0;for(const x of[...r].sort((a,b)=>b.date.localeCompare(a.date))){if(x[f])c++;else break}return c};
const fDate=ds=>{const d=new Date(ds+"T00:00:00");return(d.getMonth()+1)+"/"+d.getDate()+" ("+"日月火水木金土"[d.getDay()]+")"};
const RK="gate.records.v3",SK="gate.settings.v3";
let recs,settings;
function loadR(){try{return JSON.parse(localStorage.getItem(RK))||[]}catch{return[]}}
function saveR(){localStorage.setItem(RK,JSON.stringify(recs))}
function loadS(){try{return{...DEFS,...JSON.parse(localStorage.getItem(SK))}}catch{return{...DEFS}}}
function saveS(){localStorage.setItem(SK,JSON.stringify(settings))}
recs=loadR();settings=loadS();
function detectPhase(){const t=todayS(),y=yesterdayS(),tR=recs.find(r=>r.date===t),yR=recs.find(r=>r.date===y);if(tR?.wakeup)return"wake-done";const bed=tR?.bedtime?tR:(yR?.bedtime?yR:null);if(!bed?.bedtime)return"bed";const now=new Date(),[wh,wm]=settings.wakeTarget.split(":").map(Number),wt=new Date(now);wt.setHours(wh,wm,0,0);const h=now.getHours();if(h>=0&&h<wh+1)return now<wt?"night":"wake";if(h>=17)return"night";return"wake"}
let phase=detectPhase(),view="gate";const V=$("#view");
function setBg(p){const b={bed:"linear-gradient(135deg,#0a0e18,#141e30)",night:"linear-gradient(180deg,#060810,#0c1018,#10162a)",wake:"linear-gradient(180deg,#060810,#0c1018,#10162a)","wake-done":"linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)",history:"linear-gradient(180deg,#0a0e14,#12182a)",settings:"linear-gradient(180deg,#0a0e14,#12182a)"};document.body.style.background=b[p]||b.bed}

function switchView(v){view=v;document.querySelectorAll(".tab").forEach(t=>t.classList.remove("on"));$(v==="gate"?"#tabGate":v==="history"?"#tabHistory":"#tabSettings").classList.add("on");render()}

function render() {
  // 既存の背景削除
  document.querySelectorAll(".stars,.light-particles,.sunrise-bg").forEach(e => e.remove());
  
  const p = view === "gate" ? phase : view;
  setBg(p);
  
  $("#phaseLabel").textContent = view === "gate" ? (PNAME[phase] || "") : "";
  V.className = "main " + (view === "gate" ? "centered" : "top");

  // --- フェードイン演出の追加 ---
  V.classList.remove("view-fade");
  void V.offsetWidth; // 強制的に再描画させてアニメーションをリセットする呪文
  V.classList.add("view-fade");
  // ---------------------------

  if (view === "gate") {
    if (phase === "bed") renderBed();
    else if (phase === "night") renderNight();
    else if (phase === "wake") renderWake();
    else renderWakeDone();
  } else if (view === "history") {
    renderHistory();
  } else {
    renderSettings();
  }
}

function makeStars(n = 35) {
  const d = document.createElement("div");
  d.className = "stars";

  for (let i = 0; i < n; i++) {
    const s = document.createElement("div");
    s.className = "star";

    // 配置
    s.style.left = Math.random() * 100 + "%";
    s.style.top = Math.random() * 100 + "%";

    // サイズの振り分け
    const z = Math.random() < .15 ? 2.5 : Math.random() < .4 ? 1.8 : 1.2;
    s.style.width = z + "px";
    s.style.height = z + "px";

    // アニメーション設定
    s.style.setProperty("--dur", (3 + Math.random() * 4) + "s");
    
    // 遅延をマイナス値にすることで、ページ表示時に「再生途中」の状態にする
    s.style.setProperty("--del", "-" + (Math.random() * 5) + "s");

    d.appendChild(s);
  }
  document.body.appendChild(d);
}

function makeLights(n=20){const d=document.createElement("div");d.className="light-particles";for(let i=0;i<n;i++){const p=document.createElement("div");p.className="light-p";p.style.left=Math.random()*100+"%";p.style.bottom="-20px";const z=2+Math.random()*4;p.style.width=z+"px";p.style.height=z+"px";const w=Math.random();p.style.background=w>.5?"rgba(255,"+(180+Math.random()*60|0)+","+(80+Math.random()*60|0)+",.5)":"rgba(255,255,"+(180+Math.random()*60|0)+",.3)";p.style.setProperty("--dur",(8+Math.random()*10)+"s");p.style.setProperty("--del",Math.random()*8+"s");d.appendChild(p)}document.body.appendChild(d)}

/* ══ BED ══ */
let selTask=null;
function renderBed(){const cat=bedCat(settings.thresholds),m=pick(MSG.bedtime[cat]),mins=sleepL(settings.wakeTarget),stk=getStreak(recs,"bedtime");selTask=null;

V.innerHTML='<div class="card"><div class="clock" id="clk">'+hm()+'</div><div class="sub" style="margin-top:8px">'+settings.wakeTarget+' 起床まで '+fmtD(mins)+'</div>'+(stk>=2?'<div class="strk" style="margin-top:8px">'+pick(MSG.streakBed).replace("{n}",stk)+'</div>':'')+'<div class="accent"></div><div class="msg">'+m+'</div></div><div class="input-lbl">明朝やること</div><div class="chip-row">'+TASKS.map(t=>'<button class="chip" data-id="'+t.id+'">'+t.icon+' '+t.label+'</button>').join('')+'</div><div id="otherWrap" class="hidden"><input class="input" id="otherInput" placeholder="具体的に一言"></div><div class="self-wake">「'+settings.wakeTarget+' に起きる」──意識してから眠れ。</div><button class="big-btn bed faint" id="sleepBtn" disabled>就寝する</button>';
document.querySelectorAll(".chip").forEach(c=>{c.onclick=()=>{document.querySelectorAll(".chip").forEach(x=>x.classList.remove("on"));c.classList.add("on");selTask=c.dataset.id;$("#otherWrap").classList.toggle("hidden",selTask!=="other");$("#sleepBtn").disabled=false;$("#sleepBtn").classList.remove("faint")}});
$("#sleepBtn").onclick=doSleep}
function doSleep(){if(!selTask)return;const tl=TASKS.find(t=>t.id===selTask)?.label||"",ft=selTask==="other"&&$("#otherInput")?tl+"："+($("#otherInput").value.trim()||""):tl;
const ol=document.createElement("div");ol.className="overlay";ol.style.background="rgba(4,6,10,0.96)";
ol.innerHTML='<div class="ov-text d1" style="font-family:var(--fd);font-size:22px;color:#8a9aaa;letter-spacing:.2em">眠りの刻</div><div class="ov-text d2" style="font-family:var(--fd);font-size:13px;color:#3a4a5a;font-weight:600;letter-spacing:.08em">'+settings.wakeTarget+' に、また会おう。…おやすみ。</div>';
document.body.appendChild(ol);setTimeout(()=>{const now=new Date().toISOString(),td=todayS(),ex=recs.find(r=>r.date===td);if(ex){ex.bedtime=now;ex.task=ft;ex.taskId=selTask}else recs.push({date:td,bedtime:now,wakeup:null,task:ft,taskId:selTask});saveR();phase=detectPhase();ol.remove();render()},8000)}

/* ══ NIGHT ══ */
function renderNight() {
  const h = new Date().getHours();
  const [wh] = settings.wakeTarget.split(":").map(Number);
  const pre = (h >= Math.max(0, wh - 2) && h < wh) || (h >= 3 && h < wh);

V.innerHTML = `
    <div class="clock" style="color:#3a4a5a; font-size:32px" id="clk">${hm()}</div>
    
    <div class="sub" style="color:#2a3540; margin-bottom:16px">
      ${settings.wakeTarget} まで ${fmtD(sleepL(settings.wakeTarget))}
    </div>

    <div id="nMsg" class="night-msg" style="height:3.2em; display:flex; align-items:center; justify-content:center; margin-bottom:24px; max-width:none">
      ${pick(pre ? MSG.night.predawn : MSG.night.deep)}
    </div>

    <div style="display:flex; flex-direction:column; gap:12px; align-items:center; position:relative">
      <button class="sm-btn" id="rslp" style="width:160px">寝直す</button>
      <button class="xs-btn" id="rbed" style="width:160px">就寝を取消</button>
      
      <div id="cfArea" class="hidden" style="position:absolute; top:calc(100% + 8px); left:50%; transform:translateX(-50%); width:240px; white-space:nowrap">
      </div>
    </div>
  `;

  makeStars();

  // 寝直すボタンの処理
  $("#rslp").onclick = () => {
    const now = new Date().toISOString();
    const td = todayS();
    const yd = yesterdayS();
    const tr = recs.find(r => r.date === td);
    
    if (tr) tr.bedtime = now;
    else {
      const yr = recs.find(r => r.date === yd);
      if (yr) yr.bedtime = now;
    }
    
    saveR();
    $("#nMsg").textContent = pick(MSG.resleep);
    
    setTimeout(() => {
      const h2 = new Date().getHours();
      const p2 = (h2 >= Math.max(0, wh - 2) && h2 < wh) || (h2 >= 3 && h2 < wh);
      $("#nMsg").textContent = pick(p2 ? MSG.night.predawn : MSG.night.deep);
    }, 8000);
  };

  // 取消ボタンの処理
  $("#rbed").onclick = () => {
    $("#cfArea").classList.remove("hidden");
    $("#cfArea").innerHTML = `
      <div class="confirm-row">
        <span>就寝記録を消す？</span>
        <button class="xs-btn" id="cfY" style="color:#8a5050;border-color:#5a3030">はい</button>
        <button class="xs-btn" id="cfN">いいえ</button>
      </div>
    `;
    
    $("#cfY").onclick = () => {
      recs = recs.map(r => (r.date === todayS() || r.date === yesterdayS()) 
        ? { ...r, bedtime: null, task: null, taskId: null } 
        : r).filter(r => r.bedtime || r.wakeup);
      saveR();
      phase = detectPhase();
      render();
    };
    
    $("#cfN").onclick = () => $("#cfArea").classList.add("hidden");
  };
}

/* ══ WAKE (3-step) ══ */
function getBedRec(){const td=todayS(),yd=yesterdayS();let r=recs.find(x=>x.date===td);if(!r?.bedtime)r=recs.find(x=>x.date===yd);return r}
function renderWake(){const bedRec=getBedRec();const correctId=bedRec?.taskId||null;
V.innerHTML='<div class="card" style="background:rgba(255,255,255,.04)"><div class="clock" id="clk" style="font-size:36px">'+hm()+'</div><div class="accent"></div><div class="msg" id="wMsg">目が覚めたか。──昨夜決めたことを思い出せ。</div><div class="sub" id="wSub">今朝やることを選べ。</div></div><div class="chip-row" id="wQuiz"></div><div id="step2" class="hidden" style="display:flex;flex-direction:column;align-items:center;gap:12px"></div>';
let choices=[];if(correctId){choices.push(correctId);const others=TASKS.filter(t=>t.id!==correctId).map(t=>t.id);while(choices.length<3&&others.length){const i=Math.floor(Math.random()*others.length);choices.push(others.splice(i,1)[0])}for(let i=choices.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[choices[i],choices[j]]=[choices[j],choices[i]]}}else{choices=TASKS.slice(0,3).map(t=>t.id)}
const qEl=$("#wQuiz");choices.forEach(id=>{const t=TASKS.find(x=>x.id===id);const btn=document.createElement("button");btn.className="chip";btn.textContent=t.icon+" "+t.label;
btn.onclick=()=>{if(id===correctId||!correctId){btn.classList.add("on");$("#wMsg").textContent="そうだ。──では、起きろ。";$("#wSub").textContent="下の環を長押しせよ。";qEl.classList.add("hidden");showHoldRing()}else{btn.classList.add("wrong");setTimeout(()=>btn.classList.remove("wrong"),500);$("#wMsg").textContent="違う。──もう一度思い出せ。"}};qEl.appendChild(btn)})}

function showHoldRing(){const s2=$("#step2");s2.classList.remove("hidden");
s2.innerHTML='<div class="hold-ring" id="holdRing"><svg viewBox="0 0 180 180"><circle class="track" cx="90" cy="90" r="85"/><circle class="fill" id="hFill" cx="90" cy="90" r="85" stroke-dasharray="534" stroke-dashoffset="534"/></svg><div class="hold-center" id="holdArea"><div class="hold-label">長押し</div><div class="hold-sub">押し続けろ</div></div></div>';
const sunBg=document.createElement("div");makeLights();sunBg.className="sunrise-bg";sunBg.style.background="linear-gradient(180deg,#060810,#0c1018,#10162a)";document.body.appendChild(sunBg);makeLights();
const HOLD=4000,C=534,fill=$("#hFill"),area=$("#holdArea");let holding=false,startT=0,raf=0,prog=0;
const DAWN=[[0,"linear-gradient(180deg,#0c1018,#10162a)"],[.25,"linear-gradient(180deg,#1a1520,#1e2040)"],[.5,"linear-gradient(180deg,#2a1c24,#2e2838)"],[.75,"linear-gradient(180deg,#4a3028,#3a2820)"],[1,"linear-gradient(180deg,#6a4828 0%,#c89060 50%,#f0c880 100%)"]];
function lBg(p){for(let i=DAWN.length-1;i>=0;i--)if(p>=DAWN[i][0]){sunBg.style.background=DAWN[i][1];return}}
function tick(){if(!holding)return;prog=Math.min(1,(Date.now()-startT)/HOLD);fill.setAttribute("stroke-dashoffset",C*(1-prog));lBg(prog);const b=Math.round(160+prog*80);area.querySelector(".hold-label").style.color="rgb("+b+","+(b-20)+","+(b-40)+")";if(prog>=1){completeWake();return}raf=requestAnimationFrame(tick)}
function go(e){e.preventDefault();holding=true;startT=Date.now()-prog*HOLD;tick()}
function stop(){holding=false;cancelAnimationFrame(raf);if(prog<1){const rv=()=>{prog=Math.max(0,prog-.02);fill.setAttribute("stroke-dashoffset",C*(1-prog));lBg(prog);if(prog>0)requestAnimationFrame(rv)};rv()}}
area.addEventListener("mousedown",go);area.addEventListener("touchstart",go,{passive:false});document.addEventListener("mouseup",stop);document.addEventListener("touchend",stop);document.addEventListener("touchcancel",stop)}

function completeWake(){document.querySelectorAll(".sunrise-bg").forEach(e=>e.remove());
const now=new Date().toISOString(),td=todayS(),bedRec=getBedRec(),ex=recs.find(r=>r.date===td);
if(ex){ex.wakeup=now;ex.bedtime=ex.bedtime||bedRec?.bedtime;ex.task=ex.task||bedRec?.task;ex.taskId=ex.taskId||bedRec?.taskId}else recs.push({date:td,bedtime:bedRec?.bedtime,wakeup:now,task:bedRec?.task,taskId:bedRec?.taskId});saveR();phase=detectPhase();
const ol=document.createElement("div");ol.className="overlay wake-ol";ol.style.background = "radial-gradient(ellipse at 50% 40%, rgba(26, 33, 62, .9), rgba(15, 20, 46, .95))";
ol.innerHTML='<div class="ov-text d1" style="font-family:var(--fd);font-size:24px;color:#d4b870;letter-spacing:.2em">目覚めの刻</div><div class="ov-text d2" style="font-family:var(--fd);font-size:13px;color:#8a7a5a;font-weight:600;letter-spacing:.08em">おはよう。…よく眠れたか。</div>';
document.body.appendChild(ol);setTimeout(()=>{ol.remove();render()},8000)}

/* ══ WAKE DONE ══ */
function renderWakeDone() {
  const rec = recs.find(r => r.date === todayS());
  const stk = getStreak(recs, "wakeup");

  if (!rec?.wakeup) {
    V.innerHTML = '<div class="msg">記録なし</div>';
    return;
  }

  const dur = diffM(rec.bedtime, rec.wakeup);
  const m = pick(MSG.wakeup[wakeCat(dur)]);
  const tc = TASKS.find(t => t.id === rec.taskId);
  const tm = tc ? pick(tc.wake) : "";
  const trem = rec.task ? pick(MSG.taskReminder) : "";
  const dc = dur >= 360 ? "#6a9a5a" : dur >= 300 ? "#a09060" : "#9a5a5a";

  V.innerHTML = `
    <div class="card" style="background:rgba(255,255,255,.04); min-height:440px; display:flex; flex-direction:column; align-items:center; justify-content:center">
      <div class="clock" id="clk" style="font-size:32px">${hm()}</div>
      
      <div style="height:20px; margin:8px 0; display:flex; align-items:center; justify-content:center">
        ${stk >= 2 ? `<div class="strk">${pick(MSG.streakWake).replace("{n}", stk)}</div>` : ''}
      </div>

      <div class="accent"></div>

      <div class="sleep-info" style="margin:12px 0">
        ${rec.bedtime ? `
          <div class="stat">
            <div class="stat-v">${fmtT(rec.bedtime)}</div>
            <div class="stat-l">就寝</div>
          </div>` : ''}
        <div class="stat">
          <div class="stat-v">${fmtT(rec.wakeup)}</div>
          <div class="stat-l">起床</div>
        </div>
        <div class="stat">
          <div class="stat-v" style="color:${dc}">${fmtD(dur)}</div>
          <div class="stat-l">睡眠</div>
        </div>
      </div>

      <div class="accent"></div>

      <div style="height:4em; display:flex; flex-direction:column; justify-content:center; align-items:center; width:100%">
        <div class="msg" style="padding:0">${m}</div>
      </div>

      <div style="height:80px; margin-top:12px; display:flex; flex-direction:column; justify-content:center; align-items:center;width:100%">
        ${trem ? `
          <div class="task-lbl" style="margin-bottom:2px">${trem}</div>
          ${tm ? `<div class="task-msg" style="margin-top:6px">${tm}</div>` : ''}
        ` : ''}
      </div>
    </div>
  `;
}

/* ══ HISTORY ══ */
function renderHistory(){const sorted=[...recs].sort((a,b)=>b.date.localeCompare(a.date));if(!sorted.length){V.innerHTML='<div class="sub" style="padding:40px 0">記録なし</div>';return}
V.innerHTML=sorted.map(r=>{const dur=diffM(r.bedtime,r.wakeup);return'<div class="rec-row"><div style="color:#4a5568;font-size:12px;min-width:68px">'+fDate(r.date)+'</div><div style="display:flex;gap:6px"><span class="badge '+(r.bedtime?"on":"off")+'">就 '+(r.bedtime?fmtT(r.bedtime):"--:--")+'</span><span class="badge '+(r.wakeup?"on":"off")+'">起 '+(r.wakeup?fmtT(r.wakeup):"--:--")+'</span></div><div style="color:#a09060;font-family:var(--fd);font-size:13px;min-width:70px;text-align:right">'+fmtD(dur)+'</div></div>'}).join("")}

/* ══ SETTINGS ══ */
function renderSettings(){V.innerHTML='<div style="width:100%;max-width:400px"><div class="s-row"><span class="s-lbl">起床目標時刻</span><input type="time" class="s-in" id="sW" value="'+settings.wakeTarget+'"></div><div style="font-size:12px;color:#3a4555;padding:16px 0 8px;font-family:var(--fd)">就寝ゲート ── 時刻閾値</div><div class="s-row"><span class="s-lbl">早い ── 未満</span><input type="time" class="s-in" id="sE" value="'+settings.thresholds.early+'"></div><div class="s-row"><span class="s-lbl">適正 ── 未満</span><input type="time" class="s-in" id="sN" value="'+settings.thresholds.normal+'"></div><div class="s-row"><span class="s-lbl">遅い ── 未満</span><input type="time" class="s-in" id="sL" value="'+settings.thresholds.late+'"></div><div style="font-size:12px;color:#2a3038;padding:4px 0 16px">上記未満 → 深夜</div><div style="padding-top:24px;border-top:1px solid rgba(255,255,255,.03)"><button class="xs-btn" id="dA" style="color:#6a3030;border-color:#3a2020">全記録を削除</button></div></div>';
const b=(i,f)=>$(i).addEventListener("change",f);b("#sW",e=>{settings.wakeTarget=e.target.value;saveS()});b("#sE",e=>{settings.thresholds.early=e.target.value;saveS()});b("#sN",e=>{settings.thresholds.normal=e.target.value;saveS()});b("#sL",e=>{settings.thresholds.late=e.target.value;saveS()});
$("#dA").onclick=()=>{if(confirm("全記録を削除する。よいな？")){localStorage.removeItem(RK);recs=[];phase=detectPhase();render()}}}

/* ══ Tick ══ */
setInterval(()=>{const c=$("#clk");if(c)c.textContent=hm();if(view==="gate"){const np=detectPhase();if(np!==phase){phase=np;render()}}},30000);
render();
if("serviceWorker"in navigator)navigator.serviceWorker.register("./sw.js").catch(()=>{});
</script>
</body>
